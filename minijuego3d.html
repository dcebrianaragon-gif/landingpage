<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTOGP™ SIMULATOR 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;color:#fff;font-family:'Courier New',monospace;}
canvas.three{display:block;position:fixed;inset:0;z-index:0;}
 
/* ── HUD ── */
#hud{
  position:fixed;inset:0;pointer-events:none;z-index:10;
  padding:16px 20px;display:none;flex-direction:column;justify-content:space-between;
}
.hud-row{display:flex;justify-content:space-between;align-items:flex-start;}
.hud-box{
  background:rgba(0,0,0,.75);border:1px solid #1e1e1e;padding:8px 14px;
  font-size:11px;letter-spacing:2px;color:#666;backdrop-filter:blur(4px);
}
.hud-box b{display:block;font-size:20px;color:#00f2ff;letter-spacing:0;font-family:'Arial Black',sans-serif;line-height:1.1;}
.hud-box.red b{color:#e10000;}
.hud-sub{font-size:9px;color:#3a3a3a;margin-top:2px;}
 
/* ── BOTÓN VOLVER ── */
#btn-back{
  position:fixed;top:16px;right:20px;z-index:300;
  background:rgba(0,0,0,.9);border:1px solid #e10000;color:#e10000;
  padding:9px 18px;font-family:'Courier New',monospace;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;cursor:pointer;display:none;
  transition:.25s;backdrop-filter:blur(4px);
}
#btn-back:hover{background:#e10000;color:#fff;}
 
/* ── NOTIFICACIÓN VUELTA ── */
#lap-notify{
  position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);
  font-family:'Arial Black',sans-serif;font-size:56px;font-style:italic;
  color:#e10000;text-shadow:0 0 50px rgba(225,0,0,1);
  pointer-events:none;z-index:200;opacity:0;
  transition:opacity .2s;white-space:nowrap;
}
 
/* ── MENSAJE FUERA DE PISTA ── */
#offtrack-msg{
  position:fixed;top:28%;left:50%;transform:translate(-50%,-50%);
  font-family:'Arial Black',sans-serif;font-size:22px;font-style:italic;
  color:#ff8800;text-shadow:0 0 20px rgba(255,136,0,.8);
  pointer-events:none;z-index:200;opacity:0;transition:opacity .3s;
}
 
/* ── MINI-MAPA ── */
#minimap-wrap{
  position:fixed;bottom:52px;right:20px;z-index:15;pointer-events:none;
  border:1px solid #1e1e1e;background:rgba(0,0,0,.8);
}
#minimap{display:block;}
 
/* ── CONTROLES ── */
#ctrl-help{
  position:fixed;bottom:10px;left:0;width:100%;text-align:center;
  font-size:10px;color:#2a2a2a;pointer-events:none;z-index:5;letter-spacing:2px;
}
 
/* ── MENÚ ── */
#menu-wrap{
  position:fixed;inset:0;background:rgba(0,0,0,.94);
  display:flex;align-items:center;justify-content:center;z-index:50;
}
.panel{
  border:2px solid #e10000;padding:32px 42px;max-width:740px;width:95%;
  max-height:92vh;overflow-y:auto;text-align:center;
}
.panel::-webkit-scrollbar{width:3px;}
.panel::-webkit-scrollbar-thumb{background:#e10000;}
.panel h1{
  font-family:'Arial Black',sans-serif;font-style:italic;
  font-size:32px;text-transform:uppercase;margin-bottom:4px;
}
.panel h1 span{color:#e10000;}
.sub{color:#3a3a3a;font-size:10px;letter-spacing:3px;margin-bottom:26px;display:block;}
.lbl{
  font-size:9px;color:#444;letter-spacing:4px;text-transform:uppercase;
  margin:20px 0 10px;border-bottom:1px solid #0e0e0e;padding-bottom:5px;text-align:left;
}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.sb{
  background:transparent;border:1px solid #222;color:#888;
  padding:13px 7px;font-family:'Courier New',monospace;font-size:11px;
  cursor:pointer;transition:.2s;text-align:center;text-transform:uppercase;
}
.sb:hover,.sb.on{border-color:#e10000;background:rgba(225,0,0,.1);color:#fff;}
.sb small{display:block;font-size:8px;color:#444;margin-top:3px;text-transform:none;letter-spacing:0;}
.go{
  margin-top:20px;width:100%;padding:15px;background:transparent;
  border:2px solid #e10000;color:#e10000;font-family:'Arial Black',sans-serif;
  font-size:15px;font-style:italic;letter-spacing:5px;text-transform:uppercase;cursor:pointer;transition:.3s;
}
.go:hover{background:#e10000;color:#fff;}
 
/* ── INDICADOR DE MARCHA ── */
#gear-box{
  position:fixed;bottom:52px;left:20px;z-index:15;pointer-events:none;
  background:rgba(0,0,0,.8);border:1px solid #1e1e1e;padding:6px 14px;text-align:center;
}
#gear-num{font-family:'Arial Black',sans-serif;font-size:40px;color:#e10000;line-height:1;}
#gear-lbl{font-size:8px;color:#333;letter-spacing:3px;}
 
/* ── BARRA RPM ── */
#rpm-bar-wrap{
  position:fixed;bottom:52px;left:70px;z-index:15;pointer-events:none;
  display:flex;align-items:flex-end;gap:3px;height:50px;
}
.rpm-seg{width:8px;background:#1a1a1a;border-radius:2px 2px 0 0;transition:background .05s;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

<div id="hud">
  <div class="hud-row">
    <div class="hud-box">
      <span>TIEMPO VUELTA</span>

      <div class="hud-sub">MEJOR: <span id="h-best">--</span>s</div>

  </div>
</div>
 
<!-- Marcha + RPM -->
<div id="gear-box"><div id="gear-num">N</div><div id="gear-lbl">MARCHA</div></div>
<div id="rpm-bar-wrap" id="rpm-wrap"></div>
 
<button id="btn-back" onclick="goMenu()">← MENÚ</button>
<div id="lap-notify">VUELTA ✓</div>
<div id="offtrack-msg">⚠ FUERA DE PISTA</div>
 
<div id="minimap-wrap"><canvas id="minimap" width="150" height="150"></canvas></div>
<div id="ctrl-help">[W/↑] ACELERAR &nbsp;·&nbsp; [A/D / ←→] GIRAR &nbsp;·&nbsp; [S/↓] FRENAR &nbsp;·&nbsp; [ESPACIO] FRENO DELANTERO</div>
 
<!-- MENÚ -->
<div id="menu-wrap">
  <div class="panel">
    <h1>MOTOGP™ <span>SIMULATOR</span></h1>
    <span class="sub">2026 SEASON · SELECT YOUR SETUP</span>
    <div class="lbl">Elige Circuito</div>
    <div class="g3" id="circuit-grid"></div>
    <div class="lbl">Elige tu Moto</div>
    <div class="g2" id="bike-grid"></div>
    <button class="go" onclick="launch()">▶ ENCENDER MOTOR</button>
  </div>
</div>
 
<script>
// ═══════════════════════════════════════════════════════
// DATOS — Circuitos y Motos
// ═══════════════════════════════════════════════════════
 
// Cada circuito tiene waypoints [X, Z] que se interpolan con Catmull-Rom.
// He diseñado cada uno para parecerse al trazado real.
const CIRCUITS = [
  {
    id:'jerez', name:'JEREZ', flag:'🇪🇸', laps:5, trackW:13,
    // Empieza en recta principal, curvas lentas tipo Jerez
    wps:[
      [0,0],[55,-8],[100,0],[120,40],[118,90],
      [100,140],[65,168],[25,175],[-20,168],
      [-62,145],[-85,100],[-88,50],[-70,5],
      [-35,-15],[-5,-5],[0,0]
    ]
  },
  {
    id:'mugello', name:'MUGELLO', flag:'🇮🇹', laps:5, trackW:14,
    // Larga recta, curvas rápidas y el Arrabbiata
    wps:[
      [0,0],[75,-5],[130,10],[165,60],[160,130],
      [135,195],[80,225],[15,230],[-50,215],
      [-95,175],[-118,115],[-112,55],[-75,10],[-20,-3],[0,0]
    ]
  },
  {
    id:'assen', name:'ASSEN', flag:'🇳🇱', laps:5, trackW:12,
    // Muchas curvas encadenadas tipo "TT Circuit"
    wps:[
      [0,0],[42,8],[78,35],[88,75],[75,115],
      [45,138],[8,145],[-28,138],[-52,110],
      [-62,72],[-52,35],[-22,8],[0,0]
    ]
  },
  {
    id:'valencia', name:'VALENCIA', flag:'🇪🇸', laps:5, trackW:13,
    wps:[
      [0,0],[68,-5],[112,12],[125,62],[112,118],
      [72,148],[22,158],[-28,148],[-68,110],
      [-85,60],[-72,10],[-35,-12],[0,0]
    ]
  },
  {
    id:'sachsenring', name:'SACHSEN.', flag:'🇩🇪', laps:5, trackW:11,
    // Pista corta, curva izquierda larguísima característica
    wps:[
      [0,0],[38,-3],[65,12],[72,50],[62,88],
      [28,108],[-15,105],[-48,78],[-58,38],
      [-42,-10],[0,0]
    ]
  },
  {
    id:'cota', name:'COTA', flag:'🇺🇸', laps:5, trackW:15,
    // Pista técnica americana con eses y curvas rápidas
    wps:[
      [0,0],[55,-8],[98,18],[122,72],[115,135],
      [88,175],[48,190],[0,185],[-42,165],
      [-72,128],[-95,80],[-105,28],[-85,-18],
      [-45,-28],[-10,-10],[0,0]
    ]
  },
];
 
const BIKES = [
  { name:'DUCATI',  flag:'🇮🇹', info:'Potencia bruta · V4',  maxSpd:2.7, accel:.040, brake:.070, turn:.040, lean:.13, topGear:6, color:0xe10000 },
  { name:'KTM',     flag:'🇦🇹', info:'Giros rápidos · V4',   maxSpd:2.1, accel:.031, brake:.065, turn:.058, lean:.17, topGear:6, color:0xff6600 },
  { name:'HONDA',   flag:'🇯🇵', info:'Equilibrada · V4',     maxSpd:2.2, accel:.033, brake:.068, turn:.050, lean:.15, topGear:6, color:0xffd700 },
  { name:'YAMAHA',  flag:'🇯🇵', info:'Suave · 4 cil. línea', maxSpd:2.3, accel:.029, brake:.062, turn:.044, lean:.11, topGear:6, color:0x3399ff },
];
 
// ═══════════════════════════════════════════════════════
// MENÚ — construir botones
// ═══════════════════════════════════════════════════════
let selC=0, selB=0;
 
(function buildMenus(){
  const cg=document.getElementById('circuit-grid');
  CIRCUITS.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='sb'+(i===0?' on':'');
    b.innerHTML=`${c.flag} ${c.name}<small>${c.laps} vueltas</small>`;
    b.onclick=()=>{selC=i;cg.querySelectorAll('.sb').forEach(x=>x.classList.remove('on'));b.classList.add('on');};
    cg.appendChild(b);
  });
  const bg=document.getElementById('bike-grid');
  BIKES.forEach((bk,i)=>{
    const b=document.createElement('button');
    b.className='sb'+(i===0?' on':'');
    b.innerHTML=`${bk.flag} ${bk.name}<small>${bk.info}</small>`;
    b.onclick=()=>{selB=i;bg.querySelectorAll('.sb').forEach(x=>x.classList.remove('on'));b.classList.add('on');};
    bg.appendChild(b);
  });
  // Barras RPM
  const rw=document.getElementById('rpm-bar-wrap');
  for(let i=0;i<16;i++){
    const s=document.createElement('div');
    s.className='rpm-seg'; s.style.height=(15+i*2.2)+'px';
    rw.appendChild(s);
  }
})();
 
// ═══════════════════════════════════════════════════════
// THREE.JS — escena
// ═══════════════════════════════════════════════════════
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000000,.0022);
scene.background=new THREE.Color(0x040804);
 
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,2000);
camera.position.set(0,8,20);
 
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
const threeCanvas=renderer.domElement;
threeCanvas.classList.add('three');
document.body.insertBefore(threeCanvas,document.body.firstChild);
 
// Luces
scene.add(new THREE.AmbientLight(0xffffff,.5));
const sun=new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(150,350,80);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1;
sun.shadow.camera.far=800;
sun.shadow.camera.left=-300;
sun.shadow.camera.right=300;
sun.shadow.camera.top=300;
sun.shadow.camera.bottom=-300;
scene.add(sun);
 
// Luz de ambiente azulada (cielo)
const skyLight=new THREE.HemisphereLight(0x1a2a3a,0x0a0f0a,.4);
scene.add(skyLight);
 
// ═══════════════════════════════════════════════════════
// ESTADO DEL JUEGO
// ═══════════════════════════════════════════════════════
let bike=null, bkCfg=null, circuit=null;
let isPlaying=false;
 
// Física de la moto
let speed=0;          // velocidad actual (unidades/frame)
let heading=0;        // ángulo de dirección (rad). 0 = avanza en +Z
let leanAngle=0;      // inclinación visual (rad)
let gear=0;           // marcha actual (0=N,1-6)
let steerInput=0;     // [-1,0,1]
let onTrack=true;     // si está en pista
let offTrackTimer=0;  // tiempo fuera de pista para mensaje
 
// Cronómetro de vueltas
let lapCount=1, lapStart=0, bestLap=null, halfwayDone=false;
 
// Objetos de pista
let trackMeshes=[];
let spline=null;
let startPos=new THREE.Vector3();
let startHeading=0;
let splineLength=0;
 
// Cámara suave
const camTarget=new THREE.Vector3();
const camLook=new THREE.Vector3();
 
// Inputs
const keys={};
addEventListener('keydown',e=>{
  keys[e.key]=true;
  // Evitar scroll con flechas
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
addEventListener('keyup',e=>keys[e.key]=false);
const K=(...k)=>k.some(v=>keys[v]);
 
// ═══════════════════════════════════════════════════════
// CONSTRUCCIÓN DE PISTA
// ═══════════════════════════════════════════════════════
function buildTrack(cir){
  // Limpiar pista anterior
  trackMeshes.forEach(m=>scene.remove(m));
  trackMeshes=[];
 
  const W=cir.trackW;
  const SEGS=500; // más segmentos = curvas más suaves
 
  // Spline cerrada
  const pts=cir.wps.map(([x,z])=>new THREE.Vector3(x,0,z));
  const curve=new THREE.CatmullRomCurve3(pts,true,'catmullrom',.5);
  spline=curve;
  splineLength=curve.getLength();
 
  const tPts=curve.getPoints(SEGS);
 
  // ── Suelo base ──
  const ground=new THREE.Mesh(
    new THREE.PlaneGeometry(3000,3000),
    new THREE.MeshStandardMaterial({color:0x0a120a,roughness:1})
  );
  ground.rotation.x=-Math.PI/2; ground.position.y=-.18;
  ground.receiveShadow=true;
  scene.add(ground); trackMeshes.push(ground);
 
  // ── Geometría del asfalto ──
  // Construyo vértices de la banda (left/right de cada punto de la spline)
  const verts=[],uvs=[],idxs=[];
  const getTangent=(i)=>{
    const a=tPts[i%tPts.length];
    const b=tPts[(i+1)%tPts.length];
    return new THREE.Vector3().subVectors(b,a).normalize();
  };
 
  for(let i=0;i<=SEGS;i++){
    const p=tPts[i%tPts.length];
    const tang=getTangent(i);
    const right=new THREE.Vector3(-tang.z,0,tang.x); // perpendicular en XZ
    const L=p.clone().addScaledVector(right,-W/2);
    const R=p.clone().addScaledVector(right, W/2);
    verts.push(L.x,.01,L.z, R.x,.01,R.z);
    uvs.push(0,i/SEGS, 1,i/SEGS);
  }
  for(let i=0;i<SEGS;i++){
    const a=i*2,b=a+1,c=a+2,d=a+3;
    idxs.push(a,b,c, b,d,c);
  }
  const tGeo=new THREE.BufferGeometry();
  tGeo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  tGeo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  tGeo.setIndex(idxs); tGeo.computeVertexNormals();
 
  const tMesh=new THREE.Mesh(tGeo,new THREE.MeshStandardMaterial({
    color:0x1a1a1a,roughness:.9,metalness:0
  }));
  tMesh.receiveShadow=true;
  scene.add(tMesh); trackMeshes.push(tMesh);
 
  // ── Líneas de borde blancas ──
  for(const side of[-1,1]){
    const lpts=[];
    for(let i=0;i<=SEGS;i++){
      const p=tPts[i%tPts.length];
      const tang=getTangent(i);
      const right=new THREE.Vector3(-tang.z,0,tang.x);
      lpts.push(p.clone().addScaledVector(right,side*(W/2+.3)).setY(.05));
    }
    const ln=new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(lpts),
      new THREE.LineBasicMaterial({color:0xffffff,opacity:.5,transparent:true})
    );
    scene.add(ln); trackMeshes.push(ln);
  }
 
  // ── Marcas amarillas en los bordes (cada N puntos) ──
  for(let i=0;i<SEGS;i+=12){
    const p=tPts[i];
    const tang=getTangent(i);
    const right=new THREE.Vector3(-tang.z,0,tang.x);
    for(const side of[-1,1]){
      const pos=p.clone().addScaledVector(right,side*(W/2-.5)).setY(.03);
      const m=new THREE.Mesh(
        new THREE.PlaneGeometry(.5,2),
        new THREE.MeshBasicMaterial({color:0xffcc00,opacity:.6,transparent:true})
      );
      m.rotation.x=-Math.PI/2;
      m.rotation.z=Math.atan2(tang.x,tang.z);
      m.position.copy(pos);
      scene.add(m); trackMeshes.push(m);
    }
  }
 
  // ── Línea de meta ──
  {
    const p0=tPts[0],p1=tPts[1];
    const d0=new THREE.Vector3().subVectors(p1,p0).normalize();
    // Tablero de ajedrez blanco/negro
    for(let col=0;col<8;col++){
      for(let row=0;row<2;row++){
        const right=new THREE.Vector3(-d0.z,0,d0.x);
        const sqColor=(col+row)%2===0?0xffffff:0x000000;
        const sq=new THREE.Mesh(
          new THREE.PlaneGeometry(W/8,2),
          new THREE.MeshBasicMaterial({color:sqColor})
        );
        sq.rotation.x=-Math.PI/2;
        sq.rotation.y=Math.atan2(d0.x,d0.z);
        const offset=(-W/2+W/16+col*W/8);
        sq.position.copy(p0)
          .addScaledVector(right,offset)
          .addScaledVector(d0,(row-.5)*2)
          .setY(.06);
        scene.add(sq); trackMeshes.push(sq);
      }
    }
    // Punto de salida (moto empieza ligeramente adelantada)
    startPos.copy(p0).setY(0);
    startHeading=Math.atan2(-d0.x,-d0.z); // mira en la dirección de la pista
  }
 
  // ── Vallas de neumáticos en bordes ──
  for(let i=0;i<SEGS;i+=4){
    const p=tPts[i];
    const tang=getTangent(i);
    const right=new THREE.Vector3(-tang.z,0,tang.x);
    for(const side of[-1,1]){
      const pos=p.clone().addScaledVector(right,side*(W/2+2)).setY(0);
      const tyre=new THREE.Mesh(
        new THREE.CylinderGeometry(.55,.55,.45,10),
        new THREE.MeshStandardMaterial({color:0x0d0d0d,roughness:.9})
      );
      tyre.position.copy(pos).setY(.22);
      tyre.castShadow=true;
      scene.add(tyre); trackMeshes.push(tyre);
    }
  }
 
  // ── Tribunas y decoración exterior ──
  for(let i=0;i<60;i++){
    const t=i/60;
    const cp=curve.getPoint(t);
    const ct=curve.getTangent(t);
    const rgt=new THREE.Vector3(-ct.z,0,ct.x);
    const side=(Math.random()>.5?1:-1);
    const dist=W/2+10+Math.random()*20;
    const pos=cp.clone().addScaledVector(rgt,side*dist);
    const h=3+Math.random()*10;
    const w=4+Math.random()*8;
    const obj=new THREE.Mesh(
      new THREE.BoxGeometry(w,h,w*.6),
      new THREE.MeshStandardMaterial({
        color:Math.random()>.5?0x0f1f0f:0x111111,
        roughness:.85
      })
    );
    obj.position.copy(pos).setY(h/2);
    obj.castShadow=true;
    scene.add(obj); trackMeshes.push(obj);
  }
 
  // ── Árboles (cilindros verdes) ──
  for(let i=0;i<80;i++){
    const t=Math.random();
    const cp=curve.getPoint(t);
    const ct=curve.getTangent(t);
    const rgt=new THREE.Vector3(-ct.z,0,ct.x);
    const side=(Math.random()>.5?1:-1);
    const dist=W/2+18+Math.random()*50;
    const pos=cp.clone().addScaledVector(rgt,side*dist);
    const h=6+Math.random()*8;
    const tree=new THREE.Group();
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.4,.5,h*.4,6),
      new THREE.MeshStandardMaterial({color:0x3d2b1f}));
    trunk.position.y=h*.2;
    tree.add(trunk);
    const top=new THREE.Mesh(new THREE.CylinderGeometry(0,2.5,h*.7,7),
      new THREE.MeshStandardMaterial({color:0x1a4a1a,roughness:.9}));
    top.position.y=h*.55;
    tree.add(top);
    tree.position.copy(pos);
    tree.castShadow=true;
    scene.add(tree); trackMeshes.push(tree);
  }
}
 
// ═══════════════════════════════════════════════════════
// MOTO PROCEDURAL — diseño mejorado
// ═══════════════════════════════════════════════════════
function buildBike(bk){
  const g=new THREE.Group();
  const C=(c,met=.6,rou=.3)=>new THREE.MeshStandardMaterial({color:c,metalness:met,roughness:rou});
  const mc=C(bk.color), dk=C(0x0d0d0d,.9,.3), gr=C(0x444444,.8,.3), ch=C(0x222222,.7,.4);
 
  const add=(geo,mat,x,y,z,rx=0,ry=0,rz=0)=>{
    const m=new THREE.Mesh(geo,mat);
    m.position.set(x,y,z); m.rotation.set(rx,ry,rz);
    m.castShadow=true; g.add(m); return m;
  };
 
  // Chasis
  add(new THREE.BoxGeometry(.55,.5,2.1),mc,0,.85,0);
  // Carenado frontal (nariz aerodinámica)
  add(new THREE.CylinderGeometry(.14,.26,.85,8),mc,0,.85,1.3,Math.PI/2,0,0);
  // Carenado lateral izquierdo/derecho
  add(new THREE.BoxGeometry(.08,.4,1.5),mc,-.28,.85,.1);
  add(new THREE.BoxGeometry(.08,.4,1.5),mc, .28,.85,.1);
  // Depósito
  add(new THREE.BoxGeometry(.46,.26,.8),mc,0,1.2,.1);
  // Colín
  add(new THREE.BoxGeometry(.34,.2,.65),mc,0,1.06,-.9);
  // Motor
  add(new THREE.BoxGeometry(.5,.38,.85),gr,0,.53,.1);
  // Escape
  add(new THREE.CylinderGeometry(.055,.085,1.15,8),gr,.3,.43,-.25,0,0,Math.PI/2);
  add(new THREE.CylinderGeometry(.07,.07,.4,8),C(0x1a1a1a),.3,.38,-.75,0,.3,0);
  // Subchasis
  add(new THREE.BoxGeometry(.1,.08,1.1),ch,0,.62,-.45);
 
  // ── Ruedas ──
  const addWheel=(z,isFront)=>{
    // Neumático
    add(new THREE.CylinderGeometry(.38,.38,.21,20),dk,0,.38,z,0,0,Math.PI/2);
    // Aro
    const rimMat=C(0x888888,.95,.2);
    add(new THREE.CylinderGeometry(.23,.23,.23,12),rimMat,0,.38,z,0,0,Math.PI/2);
    // Radios (4 cajas delgadas)
    for(let a=0;a<4;a++){
      const ang=a*Math.PI/2;
      const sp=new THREE.Mesh(new THREE.BoxGeometry(.04,.32,.04),rimMat);
      sp.position.set(Math.sin(ang)*.13, .38+Math.cos(ang)*.13, z);
      sp.rotation.z=ang;
      sp.castShadow=true; g.add(sp);
    }
    // Freno de disco
    add(new THREE.CylinderGeometry(.28,.28,.03,16),C(0x555555,.7,.5),0,.38,z,0,0,Math.PI/2);
    // Horquilla (solo delantera)
    if(isFront){
      add(new THREE.BoxGeometry(.07,.6,.07),gr,-.1,.68,z);
      add(new THREE.BoxGeometry(.07,.6,.07),gr, .1,.68,z);
    }
  };
  addWheel(1.08,true);
  addWheel(-1.0,false);
 
  // Manillar
  add(new THREE.BoxGeometry(.72,.07,.07),dk,0,1.16,.73);
  add(new THREE.BoxGeometry(.07,.07,.12),dk,-.36,1.16,.74);
  add(new THREE.BoxGeometry(.07,.07,.12),dk, .36,1.16,.74);
 
  // ── Piloto ──
  const rider=new THREE.Group();
  // Cuerpo
  const bodyM=new THREE.Mesh(new THREE.BoxGeometry(.4,.5,.65),mc);
  bodyM.position.set(0,1.5,-.08); bodyM.castShadow=true; g.add(bodyM);
  // Brazos
  add(new THREE.BoxGeometry(.32,.1,.1),mc,-.2,1.44,.58);
  add(new THREE.BoxGeometry(.32,.1,.1),mc, .2,1.44,.58);
  // Piernas
  add(new THREE.BoxGeometry(.15,.1,.45),mc,-.18,1.05,.28);
  add(new THREE.BoxGeometry(.15,.1,.45),mc, .18,1.05,.28);
  // Casco
  add(new THREE.SphereGeometry(.21,12,10),mc,0,1.93,.17);
  // Visera
  add(new THREE.BoxGeometry(.22,.12,.04),C(0x111122,.3,.1),0,1.9,.37);
 
  return g;
}
 
// ═══════════════════════════════════════════════════════
// LAUNCH / MENÚ
// ═══════════════════════════════════════════════════════
function launch(){
  circuit=CIRCUITS[selC];
  bkCfg=BIKES[selB];
 
  buildTrack(circuit);
 
  if(bike) scene.remove(bike);
  bike=buildBike(bkCfg);
  scene.add(bike);
 
  // Estado inicial
  heading=startHeading;
  speed=0; leanAngle=0; gear=1;
  steerInput=0; onTrack=true; offTrackTimer=0;
  _closestT=0;
  halfwayDone=false;
  lapCount=1;
  lapStart=performance.now();
  bestLap=parseFloat(localStorage.getItem('mgp2_'+circuit.id))||null;
 
  // Posición inicial: ligeramente avanzada de la línea de meta
  const startOffset=new THREE.Vector3(-Math.sin(startHeading)*3,0,Math.cos(startHeading)*3);
  bike.position.copy(startPos).add(startOffset);
  bike.rotation.set(0,startHeading,0);
 
  // Cámara inicial detrás de la moto
  camTarget.copy(bike.position);
  camera.position.set(
    bike.position.x+Math.sin(startHeading)*16,
    bike.position.y+6,
    bike.position.z-Math.cos(startHeading)*16
  );
  camera.lookAt(bike.position);
 
  // UI
  document.getElementById('menu-wrap').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('btn-back').style.display='block';
  document.getElementById('h-best').textContent=bestLap?bestLap.toFixed(2):'--';
  document.getElementById('h-lap').textContent=`${lapCount} / ${circuit.laps}`;
 
  isPlaying=true;
  loop();
}
 
function goMenu(){
  isPlaying=false;
  document.getElementById('menu-wrap').style.display='flex';
  document.getElementById('hud').style.display='none';
  document.getElementById('btn-back').style.display='none';
  document.getElementById('lap-notify').style.opacity='0';
  document.getElementById('offtrack-msg').style.opacity='0';
  trackMeshes.forEach(m=>scene.remove(m)); trackMeshes=[];
  if(bike){scene.remove(bike);bike=null;}
  spline=null;
  const ctx=document.getElementById('minimap').getContext('2d');
  ctx.clearRect(0,0,150,150);
}
 
// ═══════════════════════════════════════════════════════
// DETECCIÓN DE VUELTA
// ═══════════════════════════════════════════════════════
const LAP_R=9; // radio de detección en metros
let _lapCooldown=0; // evita contar la misma vuelta dos veces
 
function checkLap(){
  if(!spline)return;
  _lapCooldown=Math.max(0,_lapCooldown-1);
 
  // Checkpoint a mitad de pista
  const mid=spline.getPoint(.5);
  const dMid=new THREE.Vector2(bike.position.x-mid.x,bike.position.z-mid.z).length();
  if(dMid<LAP_R) halfwayDone=true;
 
  // Meta
  if(halfwayDone && _lapCooldown===0){
    const dStart=new THREE.Vector2(
      bike.position.x-startPos.x,
      bike.position.z-startPos.z
    ).length();
    if(dStart<LAP_R){
      const t=(performance.now()-lapStart)/1000;
      if(t>5){ // mínimo 5s para evitar falsos positivos
        if(!bestLap||t<bestLap){
          bestLap=t;
          localStorage.setItem('mgp2_'+circuit.id,t);
          document.getElementById('h-best').textContent=t.toFixed(2);
        }
        lapCount++;
        lapStart=performance.now();
        halfwayDone=false;
        _lapCooldown=120; // ~2s de cooldown
        document.getElementById('h-lap').textContent=`${lapCount} / ${circuit.laps}`;
        // Notificación
        const n=document.getElementById('lap-notify');
        n.style.opacity='1';
        setTimeout(()=>n.style.opacity='0',1600);
      }
    }
  }
}
 
// ═══════════════════════════════════════════════════════
// T MÁS CERCANO EN LA SPLINE (búsqueda local eficiente)
// ═══════════════════════════════════════════════════════
let _closestT=0;
function getClosestT(pos){
  let best=Infinity, bt=_closestT;
  const RANGE=.3, STEPS=60;
  for(let i=0;i<=STEPS;i++){
    const t=((_closestT-RANGE/2+i/STEPS*RANGE)%1+1)%1;
    const p=spline.getPoint(t);
    const d=(p.x-pos.x)**2+(p.z-pos.z)**2;
    if(d<best){best=d;bt=t;}
  }
  _closestT=bt;
  return bt;
}
 
// ═══════════════════════════════════════════════════════
// MARCHA AUTOMÁTICA
// ═══════════════════════════════════════════════════════
function updateGear(){
  const ratio=speed/bkCfg.maxSpd;
  if(ratio<.01) gear=0;        // Neutral
  else if(ratio<.16) gear=1;
  else if(ratio<.33) gear=2;
  else if(ratio<.50) gear=3;
  else if(ratio<.67) gear=4;
  else if(ratio<.84) gear=5;
  else               gear=6;
 
  document.getElementById('gear-num').textContent=gear===0?'N':gear;
}
 
// ═══════════════════════════════════════════════════════
// MINI-MAPA
// ═══════════════════════════════════════════════════════
let mmPts=null, mmScale=1, mmOX=0, mmOZ=0;
 
function initMinimap(){
  mmPts=spline.getPoints(250);
  let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
  mmPts.forEach(p=>{
    minX=Math.min(minX,p.x);maxX=Math.max(maxX,p.x);
    minZ=Math.min(minZ,p.z);maxZ=Math.max(maxZ,p.z);
  });
  mmScale=130/Math.max(maxX-minX,maxZ-minZ);
  mmOX=10+(130-(maxX-minX)*mmScale)/2-minX*mmScale;
  mmOZ=10+(130-(maxZ-minZ)*mmScale)/2-minZ*mmScale;
}
 
function drawMinimap(){
  const mm=document.getElementById('minimap');
  const ctx=mm.getContext('2d');
  ctx.clearRect(0,0,150,150);
  if(!spline||!bike||!mmPts)return;
 
  // Pista
  ctx.beginPath();
  mmPts.forEach((p,i)=>{
    const x=p.x*mmScale+mmOX, z=p.z*mmScale+mmOZ;
    i===0?ctx.moveTo(x,z):ctx.lineTo(x,z);
  });
  ctx.closePath();
  ctx.strokeStyle='#2a2a2a';
  ctx.lineWidth=circuit.trackW*mmScale;
  ctx.stroke();
  ctx.strokeStyle='#444';
  ctx.lineWidth=1;
  ctx.stroke();
 
  // Línea de meta
  const sx=startPos.x*mmScale+mmOX, sz=startPos.z*mmScale+mmOZ;
  ctx.beginPath();
  ctx.arc(sx,sz,4,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
 
  // Moto
  const mx=bike.position.x*mmScale+mmOX;
  const mz=bike.position.z*mmScale+mmOZ;
  ctx.beginPath(); ctx.arc(mx,mz,5,0,Math.PI*2);
  ctx.fillStyle='#'+bkCfg.color.toString(16).padStart(6,'0');
  ctx.fill();
 
  // Flecha de dirección
  // heading: 0=+Z, π/2=-X → en canvas Z=abajo, X=derecha
  // rotación en canvas: 0=arriba, π/2=derecha
  // Mapeo: heading → -(heading - π/2) = π/2 - heading
  const arrowAngle=Math.PI/2-heading;
  ctx.save();
  ctx.translate(mx,mz);
  ctx.rotate(arrowAngle);
  ctx.beginPath();
  ctx.moveTo(0,-9); ctx.lineTo(4,5); ctx.lineTo(-4,5);
  ctx.closePath();
  ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore();
}
 
// ═══════════════════════════════════════════════════════
// BARRAS DE RPM
// ═══════════════════════════════════════════════════════
const rpmSegs=document.querySelectorAll('.rpm-seg');
const RPM_COLORS=['#00f2ff','#00f2ff','#00f2ff','#00f2ff',
                  '#00f2ff','#00f2ff','#00f2ff','#ffcc00',
                  '#ffcc00','#ffcc00','#ff8800','#ff8800',
                  '#e10000','#e10000','#e10000','#e10000'];
function updateRPM(){
  const ratio=speed/bkCfg.maxSpd;
  const active=Math.floor(ratio*16);
  rpmSegs.forEach((s,i)=>{
    s.style.background=i<active?RPM_COLORS[i]:'#1a1a1a';
  });
}
 
// ═══════════════════════════════════════════════════════
// LOOP PRINCIPAL
// ═══════════════════════════════════════════════════════
const DT=1; // factor de tiempo (1 frame)
 
function loop(){
  if(!isPlaying)return;
  requestAnimationFrame(loop);
 
  // ── Aceleración / Freno ──
  const accelKey=K('w','ArrowUp');
  const brakeKey=K('s','ArrowDown');
  const frontBrake=K(' '); // espacio = freno delantero
 
  if(accelKey){
    speed=Math.min(speed+bkCfg.accel,bkCfg.maxSpd);
  } else if(brakeKey){
    speed=Math.max(speed-bkCfg.brake,0);
  } else if(frontBrake){
    speed=Math.max(speed-bkCfg.brake*.6,0);
  } else {
    speed*=.980; // rozamiento
  }
 
  // Penalización por fuera de pista
  if(!onTrack) speed*=.90;
 
  // ── Giro (steering) ──
  // El ángulo de giro escala con velocidad pero no a velocidad cero
  steerInput=0;
  if(speed>.03){
    // Sensibilidad de giro: máxima a velocidad media, menor a muy alta velocidad (subviraje)
    const velFactor=Math.min(speed/bkCfg.maxSpd,1);
    const turnRate=bkCfg.turn*(1.1-velFactor*.4); // menos giro a alta vel
    if(K('a','ArrowLeft'))  {heading+=turnRate; steerInput= 1;}
    if(K('d','ArrowRight')) {heading-=turnRate; steerInput=-1;}
  }
 
  // ── Lean (inclinación) ──
  const targetLean=steerInput*.55;
  leanAngle+=(targetLean-leanAngle)*bkCfg.lean;
 
  // ── MOVIMIENTO ──
  bike.position.x-=Math.sin(heading)*speed;
  bike.position.z+=Math.cos(heading)*speed;
  bike.position.y=0;
 
  // ── ROTACIÓN con Quaternion — elimina el gimbal lock ──
  // Heading (Y mundial) + Lean (Z local a la moto)
  const qHead=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), heading);
  const qLean=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), leanAngle);
  bike.quaternion.copy(qHead).multiply(qLean);
 
  // ── Detección fuera de pista ──
  if(spline){
    const ct=getClosestT(bike.position);
    const cp=spline.getPoint(ct);
    const dist=Math.sqrt((bike.position.x-cp.x)**2+(bike.position.z-cp.z)**2);
    const wasOnTrack=onTrack;
    onTrack=dist<circuit.trackW/2+1.5;
 
    if(!onTrack){
      offTrackTimer++;
      if(offTrackTimer>10){
        document.getElementById('offtrack-msg').style.opacity='1';
      }
    } else {
      offTrackTimer=0;
      document.getElementById('offtrack-msg').style.opacity='0';
    }
  }
 
  checkLap();
  updateGear();
  updateRPM();
 
  // ── HUD ──
  const elapsed=(performance.now()-lapStart)/1000;
  document.getElementById('h-time').textContent=elapsed.toFixed(2);
  document.getElementById('h-speed').textContent=Math.floor(speed*160)+' km/h';
 
  // ── Cámara de persecución suave ──
  // La cámara va DETRÁS en la dirección opuesta al forward
  // behind.x = +sin(heading)  (opuesto a -sin)
  // behind.z = -cos(heading)  (opuesto a +cos)
  const camDist=13+speed*4;
  const camH=5+speed*1.5;
  camTarget.set(
    bike.position.x+Math.sin(heading)*camDist,
    bike.position.y+camH,
    bike.position.z-Math.cos(heading)*camDist
  );
  camera.position.lerp(camTarget,.09);
  camLook.set(
    bike.position.x-Math.sin(heading)*3,
    bike.position.y+.8,
    bike.position.z+Math.cos(heading)*3
  );
  camera.lookAt(camLook);
 
  drawMinimap();
  renderer.render(scene,camera);
}
 
// ═══════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════
addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
 
// Render inicial (fondo oscuro mientras se muestra el menú)
renderer.render(scene,camera);
 
// Parche: initMinimap se llama al construir la pista
const _origBuildTrack=buildTrack;
// (ya lo llamamos desde launch())
// Llamar initMinimap tras buildTrack
const _origLaunch=launch;
window.launch=function(){
  _origLaunch();
  if(spline) initMinimap();
};
</script>
