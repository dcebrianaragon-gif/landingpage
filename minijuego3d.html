<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOTOGP™ SIMULATOR 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{overflow:hidden;background:#000;color:#fff;font-family:'Courier New',monospace;}
canvas.three{display:block;position:fixed;inset:0;z-index:0;}
 
/* ══ HUD ══ */
#hud{
  position:fixed;inset:0;pointer-events:none;z-index:10;
  padding:16px 20px;display:none;flex-direction:column;justify-content:space-between;
}
.hud-row{display:flex;justify-content:space-between;align-items:flex-start;}
.hud-box{
  background:rgba(0,0,0,.8);border:1px solid #1e1e1e;padding:9px 15px;
  font-size:10px;letter-spacing:2px;color:#555;backdrop-filter:blur(6px);
  clip-path:polygon(0 0,100% 0,96% 100%,0 100%);
}
.hud-box b{display:block;font-size:22px;color:#00f2ff;letter-spacing:0;
  font-family:'Arial Black',sans-serif;line-height:1.1;}
.hud-box.red b{color:#e10000;}
.hud-box.grn b{color:#00ff88;}
.hud-sub{font-size:9px;color:#333;margin-top:3px;}
 
/* ══ BOTONES FIJOS ══ */
.fixed-btn{
  position:fixed;z-index:300;background:rgba(0,0,0,.92);
  border:1px solid #e10000;color:#e10000;
  padding:9px 18px;font-family:'Courier New',monospace;font-size:10px;
  letter-spacing:3px;text-transform:uppercase;cursor:pointer;
  transition:.25s;backdrop-filter:blur(4px);display:none;
}
.fixed-btn:hover{background:#e10000;color:#fff;}
#btn-menu{top:16px;right:20px;}
#btn-home{top:16px;right:130px;}
 
/* ══ NOTIFICACIONES ══ */
#lap-notify,#flag-notify{
  position:fixed;left:50%;transform:translateX(-50%);
  font-family:'Arial Black',sans-serif;font-style:italic;
  pointer-events:none;z-index:200;opacity:0;transition:opacity .25s;white-space:nowrap;
}
#lap-notify{top:40%;font-size:54px;color:#e10000;text-shadow:0 0 50px #e10000;}
#flag-notify{top:50%;font-size:36px;color:#fff;text-shadow:0 0 30px #fff;}
 
#offtrack-msg{
  position:fixed;top:26%;left:50%;transform:translate(-50%,-50%);
  font-family:'Arial Black',sans-serif;font-size:20px;font-style:italic;
  color:#ff8800;text-shadow:0 0 20px rgba(255,136,0,.8);
  pointer-events:none;z-index:200;opacity:0;transition:opacity .3s;
}
 
/* ══ MINI-MAPA ══ */
#minimap-wrap{
  position:fixed;bottom:60px;right:20px;z-index:15;pointer-events:none;
  border:1px solid #1e1e1e;background:rgba(0,0,0,.85);
}
#minimap{display:block;}
 
/* ══ MARCHA + RPM ══ */
#gear-box{
  position:fixed;bottom:60px;left:20px;z-index:15;pointer-events:none;
  background:rgba(0,0,0,.85);border:1px solid #1e1e1e;
  padding:5px 12px;text-align:center;min-width:52px;
}
#gear-num{font-family:'Arial Black',sans-serif;font-size:42px;color:#e10000;line-height:1;}
#gear-lbl{font-size:7px;color:#333;letter-spacing:3px;margin-top:1px;}
 
#rpm-wrap{
  position:fixed;bottom:60px;left:78px;z-index:15;pointer-events:none;
  display:flex;align-items:flex-end;gap:2px;height:52px;
}
.rpm-seg{width:7px;background:#111;border-radius:2px 2px 0 0;}
 
/* ══ CONTROLES ══ */
#ctrl-help{
  position:fixed;bottom:10px;left:0;width:100%;text-align:center;
  font-size:10px;color:#222;pointer-events:none;z-index:5;letter-spacing:2px;
}
 
/* ══ MENÚ PRINCIPAL ══ */
#menu-wrap{
  position:fixed;inset:0;background:rgba(0,0,0,.95);
  display:flex;align-items:center;justify-content:center;z-index:50;
}
.panel{
  border:2px solid #e10000;padding:32px 42px;max-width:760px;width:96%;
  max-height:94vh;overflow-y:auto;text-align:center;position:relative;
}
.panel::-webkit-scrollbar{width:2px;}
.panel::-webkit-scrollbar-thumb{background:#e10000;}
 
/* Botón "Volver a página principal" dentro del menú */
#btn-main-page{
  position:absolute;top:16px;left:16px;
  background:transparent;border:1px solid #333;color:#555;
  padding:7px 14px;font-family:'Courier New',monospace;font-size:9px;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:.2s;
}
#btn-main-page:hover{border-color:#e10000;color:#e10000;}
 
.panel h1{
  font-family:'Arial Black',sans-serif;font-style:italic;
  font-size:34px;text-transform:uppercase;margin-bottom:4px;
}
.panel h1 span{color:#e10000;}
.sub{color:#333;font-size:10px;letter-spacing:3px;margin-bottom:26px;display:block;}
 
.lbl{
  font-size:9px;color:#3a3a3a;letter-spacing:4px;text-transform:uppercase;
  margin:22px 0 10px;border-bottom:1px solid #0e0e0e;padding-bottom:5px;text-align:left;
}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
 
.sb{
  background:transparent;border:1px solid #1a1a1a;color:#666;
  padding:13px 8px;font-family:'Courier New',monospace;font-size:11px;
  cursor:pointer;transition:.2s;text-align:center;text-transform:uppercase;
}
.sb:hover,.sb.on{border-color:#e10000;background:rgba(225,0,0,.08);color:#fff;}
.sb small{display:block;font-size:8px;color:#3a3a3a;margin-top:3px;
  text-transform:none;letter-spacing:0;}
.sb.on small{color:#888;}
 
.go{
  margin-top:22px;width:100%;padding:16px;background:transparent;
  border:2px solid #e10000;color:#e10000;font-family:'Arial Black',sans-serif;
  font-size:16px;font-style:italic;letter-spacing:6px;text-transform:uppercase;

}
.go:hover{background:#e10000;color:#fff;}
 
/* ══ COUNTDOWN ══ */
#countdown{
  position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);
  font-family:'Arial Black',sans-serif;font-size:90px;font-style:italic;
  color:#e10000;text-shadow:0 0 60px #e10000,0 0 120px rgba(225,0,0,.4);
  pointer-events:none;z-index:300;opacity:0;transition:opacity .15s;
}
 
/* ══ SECTOR SPLITS ══ */
#sector-box{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);
  display:none;gap:4px;z-index:15;pointer-events:none;
}
.sector-dot{
  width:28px;height:6px;border-radius:3px;background:#222;
  transition:background .3s;
}
</style>

<script>

const CIRCUITS=[
  { id:'jerez',    name:'JEREZ',     flag:'🇪🇸', laps:5, trackW:13,
    wps:[[0,0],[55,-8],[100,0],[120,40],[118,90],[100,140],[65,168],

    wps:[[0,0],[75,-5],[130,10],[165,60],[160,130],[135,195],[80,225],[15,230],
         [-50,215],[-95,175],[-118,115],[-112,55],[-75,10],[-20,-3]] },
  { id:'assen',    name:'ASSEN',     flag:'🇳🇱', laps:5, trackW:12,
    wps:[[0,0],[42,8],[78,35],[88,75],[75,115],[45,138],[8,145],
         [-28,138],[-52,110],[-62,72],[-52,35],[-22,8]] },
  { id:'valencia', name:'VALENCIA',  flag:'🇪🇸', laps:5, trackW:13,
    wps:[[0,0],[68,-5],[112,12],[125,62],[112,118],[72,148],[22,158],
         [-28,148],[-68,110],[-85,60],[-72,10],[-35,-12]] },
  { id:'sachsen',  name:'SACHSEN.',  flag:'🇩🇪', laps:5, trackW:11,
    wps:[[0,0],[38,-3],[65,12],[72,50],[62,88],[28,108],
         [-15,105],[-48,78],[-58,38],[-42,-10]] },
  { id:'cota',     name:'COTA',      flag:'🇺🇸', laps:5, trackW:15,
    wps:[[0,0],[55,-8],[98,18],[122,72],[115,135],[88,175],[48,190],
         [0,185],[-42,165],[-72,128],[-95,80],[-105,28],[-85,-18],[-45,-28],[-10,-10]] },
];
 
const BIKES=[
  { name:'DUCATI', flag:'🇮🇹', info:'Potencia bruta · V4',   maxSpd:2.65, accel:.040, brake:.072, turn:.038, lean:.13, color:0xe10000 },
  { name:'KTM',    flag:'🇦🇹', info:'Giros rápidos · V4',    maxSpd:2.05, accel:.031, brake:.066, turn:.056, lean:.17, color:0xff6600 },
  { name:'HONDA',  flag:'🇯🇵', info:'Equilibrada · V4',      maxSpd:2.15, accel:.033, brake:.068, turn:.048, lean:.15, color:0xffd700 },
  { name:'YAMAHA', flag:'🇯🇵', info:'Suave · 4 cil. línea',  maxSpd:2.25, accel:.029, brake:.063, turn:.043, lean:.11, color:0x3399ff },
];
 
const RPM_COLORS=['#00f2ff','#00f2ff','#00f2ff','#00f2ff',
                  '#00f2ff','#00f2ff','#00f2ff','#ffcc00',
                  '#ffcc00','#ffcc00','#ff8800','#ff8800',
                  '#e10000','#e10000','#e10000','#e10000'];
 
// ═══════════════════════════════════════════════════════════════
//  CONSTRUIR MENÚS
// ═══════════════════════════════════════════════════════════════
let selC=0, selB=0;
 
(function buildMenus(){
  const cg=document.getElementById('circuit-grid');
  CIRCUITS.forEach((c,i)=>{
    const b=document.createElement('button');
    b.className='sb'+(i===0?' on':'');
    b.innerHTML=`${c.flag} ${c.name}<small>${c.laps} vueltas · W${c.trackW}m</small>`;
    b.onclick=()=>{ selC=i; cg.querySelectorAll('.sb').forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
    cg.appendChild(b);
  });
  const bg=document.getElementById('bike-grid');
  BIKES.forEach((bk,i)=>{
    const b=document.createElement('button');
    b.className='sb'+(i===0?' on':'');
    b.innerHTML=`${bk.flag} ${bk.name}<small>${bk.info}</small>`;
    b.onclick=()=>{ selB=i; bg.querySelectorAll('.sb').forEach(x=>x.classList.remove('on')); b.classList.add('on'); };
    bg.appendChild(b);
  });
  // Barras RPM
  const rw=document.getElementById('rpm-wrap');
  for(let i=0;i<16;i++){
    const s=document.createElement('div');
    s.className='rpm-seg';
    s.style.height=(12+i*2.5)+'px';
    rw.appendChild(s);
  }
})();
 
// ═══════════════════════════════════════════════════════════════
//  THREE.JS
// ═══════════════════════════════════════════════════════════════
const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x000000,.0020);
scene.background=new THREE.Color(0x040a04);
 
const camera=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,2000);
 
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.domElement.classList.add('three');
document.body.insertBefore(renderer.domElement,document.body.firstChild);
 
// Luces
scene.add(new THREE.AmbientLight(0xffffff,.45));
const sun=new THREE.DirectionalLight(0xffffff,1.2);
sun.position.set(150,350,80);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
['near','far','left','right','top','bottom'].forEach((k,i)=>
  sun.shadow.camera[k]=[1,800,-300,300,300,-300][i]);
scene.add(sun);
scene.add(new THREE.HemisphereLight(0x1a2a3a,0x0a0f0a,.4));
 
// Quaternion reutilizables (evita crear objetos cada frame)
const _qHead=new THREE.Quaternion();
const _qLean=new THREE.Quaternion();
const _axisY=new THREE.Vector3(0,1,0);
const _axisZ=new THREE.Vector3(0,0,1);
const _camTgt=new THREE.Vector3();
const _camLook=new THREE.Vector3();
 
// ═══════════════════════════════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════════════════════════════
let bike=null, bkCfg=null, circuit=null;
let isPlaying=false, countingDown=false;
 
let speed=0, heading=0, leanAngle=0, gear=0;
let steerInput=0, onTrack=true, offTrackTimer=0;
let lapCount=1, lapStart=0, bestLap=null, halfwayDone=false;
let _lapCooldown=0, _closestT=0;
 
// Sectores (3 zonas de la pista)
let sectorTimes=[0,0,0], sectorStart=0, currentSector=0;
const SECTOR_COLORS={good:'#00ff88',bad:'#e10000',neutral:'#ffcc00'};
 
let trackMeshes=[];
let spline=null, splineLength=0;
let startPos=new THREE.Vector3(), startHeading=0;
 
// Minimap cache
let mmPts=null, mmScale=1, mmOX=0, mmOZ=0;
 
const keys={};
addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
addEventListener('keyup',e=>{ keys[e.key]=false; });
const K=(...k)=>k.some(v=>keys[v]);
 
// ═══════════════════════════════════════════════════════════════
//  NAVEGACIÓN — volver a página principal (index.html)
// ═══════════════════════════════════════════════════════════════
function goHome(){
  isPlaying=false;
  // Intenta ir a entrada1.html; si no existe muestra mensaje
  try { window.location.href='entrada1.html'; }
  catch(e){ alert('Redirigiendo a la página principal...'); }
}
 
// ═══════════════════════════════════════════════════════════════
//  CONSTRUCCIÓN DE PISTA
// ═══════════════════════════════════════════════════════════════
function buildTrack(cir){
  trackMeshes.forEach(m=>scene.remove(m));
  trackMeshes=[];
 
  const W=cir.trackW, SEGS=600;
 
  const pts=cir.wps.map(([x,z])=>new THREE.Vector3(x,0,z));
  const curve=new THREE.CatmullRomCurve3(pts,true,'catmullrom',.5);
  spline=curve;
  splineLength=curve.getLength();
 
  const tPts=curve.getPoints(SEGS);
 
  // Suelo
  const g=new THREE.Mesh(
    new THREE.PlaneGeometry(3000,3000),
    new THREE.MeshStandardMaterial({color:0x080e08,roughness:1})
  );
  g.rotation.x=-Math.PI/2; g.position.y=-.18; g.receiveShadow=true;
  scene.add(g); trackMeshes.push(g);
 
  // Asfalto
  const getTang=i=>{
    const a=tPts[i%tPts.length], b=tPts[(i+1)%tPts.length];
    return new THREE.Vector3().subVectors(b,a).normalize();
  };
  const verts=[],uvs=[],idxs=[];
  for(let i=0;i<=SEGS;i++){
    const p=tPts[i%tPts.length], t=getTang(i);
    const r=new THREE.Vector3(-t.z,0,t.x);
    const L=p.clone().addScaledVector(r,-W/2);
    const R=p.clone().addScaledVector(r, W/2);
    verts.push(L.x,.01,L.z,R.x,.01,R.z);
    uvs.push(0,i/SEGS,1,i/SEGS);
  }
  for(let i=0;i<SEGS;i++){
    const a=i*2,b=a+1,c=a+2,d=a+3;
    idxs.push(a,b,c,b,d,c);
  }
  const tGeo=new THREE.BufferGeometry();
  tGeo.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  tGeo.setAttribute('uv',new THREE.Float32BufferAttribute(uvs,2));
  tGeo.setIndex(idxs); tGeo.computeVertexNormals();
  const tMesh=new THREE.Mesh(tGeo,new THREE.MeshStandardMaterial({color:0x181818,roughness:.92}));
  tMesh.receiveShadow=true;
  scene.add(tMesh); trackMeshes.push(tMesh);
 
  // Líneas kerb (rojo/blanco alternando)
  for(let i=0;i<SEGS;i+=6){
    const p=tPts[i], t=getTang(i);
    const r=new THREE.Vector3(-t.z,0,t.x);
    for(const side of[-1,1]){
      const kc=(Math.floor(i/6)%2===0)?0xe10000:0xffffff;
      const km=new THREE.Mesh(new THREE.PlaneGeometry(W/10,1.6),
        new THREE.MeshBasicMaterial({color:kc,opacity:.85,transparent:true}));
      km.rotation.x=-Math.PI/2;
      km.rotation.y=Math.atan2(t.x,t.z);
      km.position.copy(p).addScaledVector(r,side*(W/2-1)).setY(.03);
      scene.add(km); trackMeshes.push(km);
    }
  }
 
  // Bordes blancos
  for(const side of[-1,1]){
    const lpts=[];
    for(let i=0;i<=SEGS;i++){
      const p=tPts[i%tPts.length], t=getTang(i);
      const r=new THREE.Vector3(-t.z,0,t.x);
      lpts.push(p.clone().addScaledVector(r,side*(W/2+.4)).setY(.06));
    }
    const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints(lpts),
      new THREE.LineBasicMaterial({color:0xffffff,opacity:.45,transparent:true}));
    scene.add(ln); trackMeshes.push(ln);
  }
 
  // Línea de meta (tablero ajedrez)
  {
    const p0=tPts[0], p1=tPts[1];
    const d0=new THREE.Vector3().subVectors(p1,p0).normalize();
    const right=new THREE.Vector3(-d0.z,0,d0.x);
    for(let col=0;col<8;col++){
      for(let row=0;row<2;row++){
        const sq=new THREE.Mesh(new THREE.PlaneGeometry(W/8,2),
          new THREE.MeshBasicMaterial({color:(col+row)%2===0?0xffffff:0x000000}));
        sq.rotation.x=-Math.PI/2;
        sq.rotation.y=Math.atan2(d0.x,d0.z);
        sq.position.copy(p0)
          .addScaledVector(right,-W/2+W/16+col*W/8)
          .addScaledVector(d0,(row-.5)*2).setY(.07);
        scene.add(sq); trackMeshes.push(sq);
      }
    }
    startPos.copy(p0).setY(0);
    startHeading=Math.atan2(-d0.x,-d0.z);
  }
 
  // Neumáticos en bordes
  for(let i=0;i<SEGS;i+=5){
    const p=tPts[i], t=getTang(i), r=new THREE.Vector3(-t.z,0,t.x);
    for(const side of[-1,1]){
      const ty=new THREE.Mesh(new THREE.CylinderGeometry(.5,.5,.42,10),
        new THREE.MeshStandardMaterial({color:0x0d0d0d,roughness:.9}));
      ty.position.copy(p).addScaledVector(r,side*(W/2+2.2)).setY(.21);
      ty.castShadow=true;
      scene.add(ty); trackMeshes.push(ty);
    }
  }
 
  // Decoración exterior
  const rng=mulberry32(42);
  for(let i=0;i<80;i++){
    const t2=i/80;
    const cp=curve.getPoint(t2), ct=curve.getTangent(t2);
    const rgt=new THREE.Vector3(-ct.z,0,ct.x);
    const side=(rng()>.5?1:-1);
 
    // Tribuna
    if(i%3===0){
      const h=4+rng()*8, w=5+rng()*8;
      const obj=new THREE.Mesh(new THREE.BoxGeometry(w,h,w*.5),
        new THREE.MeshStandardMaterial({color:rng()>.5?0x0f200f:0x111111,roughness:.8}));
      obj.position.copy(cp).addScaledVector(rgt,side*(W/2+12+rng()*15)).setY(h/2);
      obj.castShadow=true;
      scene.add(obj); trackMeshes.push(obj);
    }
    // Árbol
    const dist=W/2+22+rng()*60;
    const pos2=cp.clone().addScaledVector(rgt,side*dist);
    const h2=5+rng()*9;
    const tree=new THREE.Group();
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.35,.5,h2*.38,6),
      new THREE.MeshStandardMaterial({color:0x3d2b1f}));
    trunk.position.y=h2*.19; tree.add(trunk);
    const top=new THREE.Mesh(new THREE.CylinderGeometry(0,2.2,h2*.68,7),
      new THREE.MeshStandardMaterial({color:0x1a4a18,roughness:.9}));
    top.position.y=h2*.53; tree.add(top);
    tree.position.copy(pos2); tree.castShadow=true;
    scene.add(tree); trackMeshes.push(tree);
  }
}
 
// LCG simple para decoración determinista
function mulberry32(seed){
  return function(){
    seed|=0; seed=seed+0x6D2B79F5|0;
    let t=Math.imul(seed^seed>>>15,1|seed);
    t=t+Math.imul(t^t>>>7,61|t)^t;
    return ((t^t>>>14)>>>0)/4294967296;
  };
}
 
// ═══════════════════════════════════════════════════════════════
//  MOTO PROCEDURAL
// ═══════════════════════════════════════════════════════════════
function buildBike(bk,alpha=1){
  const g=new THREE.Group();
  const C=(c,met=.6,rou=.3,op=1)=>{
    const m=new THREE.MeshStandardMaterial({color:c,metalness:met,roughness:rou});
    if(op<1){m.transparent=true;m.opacity=op;}
    return m;
  };
  const mc=C(bk.color,0,alpha<1?alpha:.3), dk=C(0x0d0d0d,.9,.3), gr=C(0x444444,.8,.3);
 
  const add=(geo,mat,x,y,z,rx=0,ry=0,rz=0)=>{
    const m=new THREE.Mesh(geo,mat);
    m.position.set(x,y,z); m.rotation.set(rx,ry,rz);
    m.castShadow=true; g.add(m);
  };
 
  // Cuerpo
  add(new THREE.BoxGeometry(.55,.5,2.1),mc,0,.85,0);
  add(new THREE.CylinderGeometry(.14,.26,.85,8),mc,0,.85,1.3,Math.PI/2,0,0);
  add(new THREE.BoxGeometry(.08,.38,1.5),mc,-.28,.85,.1);
  add(new THREE.BoxGeometry(.08,.38,1.5),mc,.28,.85,.1);
  add(new THREE.BoxGeometry(.46,.26,.8),mc,0,1.2,.1);
  add(new THREE.BoxGeometry(.34,.2,.65),mc,0,1.06,-.9);
  add(new THREE.BoxGeometry(.5,.38,.85),gr,0,.53,.1);
  add(new THREE.CylinderGeometry(.055,.085,1.15,8),gr,.3,.43,-.25,0,0,Math.PI/2);
  add(new THREE.CylinderGeometry(.065,.065,.38,8),C(0x1a1a1a),.3,.37,-.74,0,.25,0);
 
  // Ruedas
  const addW=(z,front)=>{
    const rim=C(0x888888,.95,.2);
    add(new THREE.CylinderGeometry(.38,.38,.21,22),dk,0,.38,z,0,0,Math.PI/2);
    add(new THREE.CylinderGeometry(.23,.23,.23,14),rim,0,.38,z,0,0,Math.PI/2);
    for(let a=0;a<5;a++){
      const ag=a*Math.PI*.4;
      const sp=new THREE.Mesh(new THREE.BoxGeometry(.03,.3,.03),rim);
      sp.position.set(Math.sin(ag)*.12,.38+Math.cos(ag)*.12,z);
      sp.rotation.z=ag; sp.castShadow=true; g.add(sp);
    }
    add(new THREE.CylinderGeometry(.27,.27,.035,18),C(0x555555,.7,.5),0,.38,z,0,0,Math.PI/2);
    if(front){
      add(new THREE.BoxGeometry(.07,.6,.07),gr,-.1,.68,z);
      add(new THREE.BoxGeometry(.07,.6,.07),gr,.1,.68,z);
    }
  };
  addW(1.08,true); addW(-1.0,false);
 
  // Manillar
  add(new THREE.BoxGeometry(.72,.07,.07),dk,0,1.16,.73);
  add(new THREE.BoxGeometry(.07,.07,.12),dk,-.36,1.16,.74);
  add(new THREE.BoxGeometry(.07,.07,.12),dk,.36,1.16,.74);
 
  // Piloto
  add(new THREE.BoxGeometry(.4,.52,.65),mc,0,1.5,-.08);
  add(new THREE.BoxGeometry(.32,.1,.1),mc,-.2,1.44,.58);
  add(new THREE.BoxGeometry(.32,.1,.1),mc,.2,1.44,.58);
  add(new THREE.BoxGeometry(.15,.1,.44),mc,-.18,1.05,.28);
  add(new THREE.BoxGeometry(.15,.1,.44),mc,.18,1.05,.28);
  add(new THREE.SphereGeometry(.21,12,10),mc,0,1.93,.17);
  add(new THREE.BoxGeometry(.22,.12,.04),C(0x111133,.3,.1),0,1.9,.37);
 
  return g;
}
 
// ═══════════════════════════════════════════════════════════════
//  MINIMAP
// ═══════════════════════════════════════════════════════════════
function initMinimap(){
  mmPts=spline.getPoints(300);
  let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
  mmPts.forEach(p=>{
    minX=Math.min(minX,p.x); maxX=Math.max(maxX,p.x);
    minZ=Math.min(minZ,p.z); maxZ=Math.max(maxZ,p.z);
  });
  const pad=12;
  mmScale=(150-pad*2)/Math.max(maxX-minX,maxZ-minZ);
  mmOX=pad+(150-pad*2-(maxX-minX)*mmScale)/2-minX*mmScale;
  mmOZ=pad+(150-pad*2-(maxZ-minZ)*mmScale)/2-minZ*mmScale;
}
 
function drawMinimap(){
  const mm=document.getElementById('minimap');
  const ctx=mm.getContext('2d');
  ctx.clearRect(0,0,150,150);
  if(!spline||!bike||!mmPts)return;
 
  // Pista
  ctx.beginPath();
  mmPts.forEach((p,i)=>{
    const x=p.x*mmScale+mmOX, z=p.z*mmScale+mmOZ;
    i===0?ctx.moveTo(x,z):ctx.lineTo(x,z);
  });
  ctx.closePath();
  ctx.strokeStyle='#252525'; ctx.lineWidth=circuit.trackW*mmScale*1.1; ctx.stroke();
  ctx.strokeStyle='#3a3a3a'; ctx.lineWidth=circuit.trackW*mmScale*.7; ctx.stroke();
 
  // Sectores como puntos de color
  [.33,.66].forEach(t=>{
    const p=spline.getPoint(t);
    ctx.beginPath();
    ctx.arc(p.x*mmScale+mmOX,p.z*mmScale+mmOZ,3,0,Math.PI*2);
    ctx.fillStyle='#ffcc00'; ctx.fill();
  });
 
  // Meta
  ctx.beginPath();
  ctx.arc(startPos.x*mmScale+mmOX,startPos.z*mmScale+mmOZ,4,0,Math.PI*2);
  ctx.fillStyle='#fff'; ctx.fill();
 
  // Moto
  const mx=bike.position.x*mmScale+mmOX;
  const mz=bike.position.z*mmScale+mmOZ;
  ctx.beginPath(); ctx.arc(mx,mz,6,0,Math.PI*2);
  ctx.fillStyle='#'+bkCfg.color.toString(16).padStart(6,'0');
  ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=1; ctx.stroke();
 
  // Flecha dirección
  // heading=0 → moto avanza en +Z (abajo en el canvas)
  // En canvas: eje Y apunta hacia abajo, X hacia la derecha
  // heading → ángulo canvas: abajo=π, derecha=-π/2, arriba=0, izq=π/2
  const ca=-heading+Math.PI; // ajuste para canvas
  ctx.save();
  ctx.translate(mx,mz);
  ctx.rotate(ca);
  ctx.beginPath(); ctx.moveTo(0,-9); ctx.lineTo(4,5); ctx.lineTo(-4,5);
  ctx.closePath(); ctx.fillStyle='#fff'; ctx.fill();
  ctx.restore();
}
 
// ═══════════════════════════════════════════════════════════════
//  T MÁS CERCANO EN LA SPLINE
// ═══════════════════════════════════════════════════════════════
function getClosestT(pos){
  let best=Infinity, bt=_closestT;
  const RANGE=.25, STEPS=60;
  for(let i=0;i<=STEPS;i++){
    const t=((_closestT-RANGE/2+i/STEPS*RANGE)%1+1)%1;
    const p=spline.getPoint(t);
    const d=(p.x-pos.x)**2+(p.z-pos.z)**2;
    if(d<best){best=d;bt=t;}
  }
  _closestT=bt;
  return bt;
}
 
// ═══════════════════════════════════════════════════════════════
//  MARCHA AUTOMÁTICA
// ═══════════════════════════════════════════════════════════════
function updateGear(){
  const r=speed/bkCfg.maxSpd;
  gear=r<.01?0:r<.17?1:r<.33?2:r<.50?3:r<.67?4:r<.84?5:6;
  document.getElementById('gear-num').textContent=gear===0?'N':gear;
}
 
function updateRPM(){
  const active=Math.floor((speed/bkCfg.maxSpd)*16);
  document.querySelectorAll('.rpm-seg').forEach((s,i)=>{
    s.style.background=i<active?RPM_COLORS[i]:'#111';
  });
}
 
// ═══════════════════════════════════════════════════════════════
//  SECTORES
// ═══════════════════════════════════════════════════════════════
function checkSector(t){
  const newSec=t<.33?0:t<.66?1:2;
  if(newSec!==currentSector){
    currentSector=newSec;
    sectorStart=performance.now();
    // Colorear el dot del sector anterior
    const dots=['s1','s2','s3'];
    if(newSec>0){
      const d=document.getElementById(dots[newSec-1]);
      d.style.background='#00ff88'; // simplificado: siempre verde
      setTimeout(()=>d.style.background='#222',2000);
    }
  }
}
 
// ═══════════════════════════════════════════════════════════════
//  DETECCIÓN DE VUELTA
// ═══════════════════════════════════════════════════════════════
const LAP_R=10;
 
function checkLap(){
  if(!spline)return;
  _lapCooldown=Math.max(0,_lapCooldown-1);
 
  const mid=spline.getPoint(.5);
  const dMid=Math.hypot(bike.position.x-mid.x, bike.position.z-mid.z);
  if(dMid<LAP_R) halfwayDone=true;
 
  if(halfwayDone && _lapCooldown===0){
    const dStart=Math.hypot(bike.position.x-startPos.x, bike.position.z-startPos.z);
    if(dStart<LAP_R){
      const t=(performance.now()-lapStart)/1000;
      if(t>5){
        if(!bestLap||t<bestLap){
          bestLap=t;
          localStorage.setItem('mgp3_'+circuit.id,t);
          document.getElementById('h-best').textContent=t.toFixed(2);
        }
        lapCount++;
        lapStart=performance.now();
        halfwayDone=false;
        _lapCooldown=120;
        document.getElementById('h-lap').textContent=`${lapCount} / ${circuit.laps}`;
 
        // Delta
        const deltaBox=document.getElementById('delta-box');
        const delta=bestLap?t-bestLap:0;
        if(bestLap){
          deltaBox.style.display='block';
          const dEl=document.getElementById('h-delta');
          dEl.textContent=(delta>=0?'+':'')+delta.toFixed(2);
          dEl.parentElement.className='hud-box '+(delta<0?'grn':'red');
          setTimeout(()=>deltaBox.style.display='none',4000);
        }
 
        // Notificación
        const n=document.getElementById('lap-notify');
        n.style.opacity='1';
        setTimeout(()=>n.style.opacity='0',1600);
 
        // Bandera a cuadros en última vuelta
        if(lapCount>circuit.laps){
          const f=document.getElementById('flag-notify');
          f.textContent='🏁 CARRERA TERMINADA';
          f.style.opacity='1';
        }
      }
    }
  }
}
 
// ═══════════════════════════════════════════════════════════════
//  COUNTDOWN
// ═══════════════════════════════════════════════════════════════
function startCountdown(cb){
  countingDown=true;
  const el=document.getElementById('countdown');
  const seq=['3','2','1','GO!'];
  let i=0;
  function tick(){
    el.textContent=seq[i];
    el.style.opacity='1';
    setTimeout(()=>{
      el.style.opacity='0';
      i++;
      if(i<seq.length) setTimeout(tick,900);
      else{ countingDown=false; cb(); }
    },700);
  }
  tick();
}
 
// ═══════════════════════════════════════════════════════════════
//  LAUNCH / MENU
// ═══════════════════════════════════════════════════════════════
function launch(){
  circuit=CIRCUITS[selC];
  bkCfg=BIKES[selB];
 
  buildTrack(circuit);
 
  if(bike) scene.remove(bike);
  bike=buildBike(bkCfg);
  scene.add(bike);
 
  // Estado inicial
  heading=startHeading;
  speed=0; leanAngle=0; gear=0; steerInput=0;
  onTrack=true; offTrackTimer=0; _closestT=0;
  halfwayDone=false; _lapCooldown=0;
  lapCount=1; lapStart=0; bestLap=null;
  currentSector=0; sectorStart=0;
 
  bestLap=parseFloat(localStorage.getItem('mgp3_'+circuit.id))||null;
 
  // Posición: ligeramente adelantada de la meta
  const fwd=new THREE.Vector3(-Math.sin(startHeading),0,Math.cos(startHeading));
  bike.position.copy(startPos).addScaledVector(fwd,4);
  _qHead.setFromAxisAngle(_axisY,startHeading);
  bike.quaternion.copy(_qHead);
 
  // Cámara inicial
  camera.position.set(
    bike.position.x+Math.sin(startHeading)*18,
    bike.position.y+7,
    bike.position.z-Math.cos(startHeading)*18
  );
  camera.lookAt(bike.position);
 
  initMinimap();
 
  // UI
  document.getElementById('menu-wrap').style.display='none';
  document.getElementById('hud').style.display='flex';
  document.getElementById('sector-box').style.display='flex';
  document.getElementById('btn-menu').style.display='block';
  document.getElementById('btn-home').style.display='block';
  document.getElementById('h-best').textContent=bestLap?bestLap.toFixed(2):'--';
  document.getElementById('h-lap').textContent=`${lapCount} / ${circuit.laps}`;
  ['s1','s2','s3'].forEach(id=>document.getElementById(id).style.background='#222');
 
  isPlaying=false;
  startCountdown(()=>{
    lapStart=performance.now();
    sectorStart=lapStart;
    isPlaying=true;
    loop();
  });
}
 
function goMenu(){
  isPlaying=false; countingDown=false;
  document.getElementById('menu-wrap').style.display='flex';
  document.getElementById('hud').style.display='none';
  document.getElementById('sector-box').style.display='none';
  document.getElementById('btn-menu').style.display='none';
  document.getElementById('btn-home').style.display='none';
  document.getElementById('lap-notify').style.opacity='0';
  document.getElementById('flag-notify').style.opacity='0';
  document.getElementById('offtrack-msg').style.opacity='0';
  document.getElementById('countdown').style.opacity='0';
  trackMeshes.forEach(m=>scene.remove(m)); trackMeshes=[];
  if(bike){scene.remove(bike);bike=null;}
  spline=null; mmPts=null;
  document.getElementById('minimap').getContext('2d').clearRect(0,0,150,150);
}
 
// ═══════════════════════════════════════════════════════════════
//  LOOP PRINCIPAL
// ═══════════════════════════════════════════════════════════════
function loop(){
  if(!isPlaying)return;
  requestAnimationFrame(loop);
 
  // ── Inputs ──
  const gas=K('w','ArrowUp');
  const brake=K('s','ArrowDown');
  const fbrake=K(' ');
 
  if(gas)        speed=Math.min(speed+bkCfg.accel, bkCfg.maxSpd);
  else if(brake) speed=Math.max(speed-bkCfg.brake, 0);
  else if(fbrake)speed=Math.max(speed-bkCfg.brake*.55, 0);
  else           speed*=.9805;
 
  if(!onTrack) speed*=.91;
 
  // ── Giro ──
  // Usamos un rate de giro que depende de la velocidad pero con un mínimo funcional
  steerInput=0;
  if(speed>.025){
    const vf=Math.min(speed/bkCfg.maxSpd,1);
    const rate=bkCfg.turn*(1.05-vf*.35); // subviraje a alta velocidad
    if(K('a','ArrowLeft'))  { heading+=rate; steerInput= 1; }
    if(K('d','ArrowRight')) { heading-=rate; steerInput=-1; }
  }
 
  // ── Lean con inercia ──
  const targetLean=steerInput*.52;
  leanAngle+=(targetLean-leanAngle)*bkCfg.lean;
 
  // ── Movimiento ──
  // heading=0 → forward=(0,0,+1) → x-=sin(0)=0, z+=cos(0)=1 ✓
  // heading=π/2 → forward=(-1,0,0) → x-=sin(π/2)=1→ x-=1 ✓
  bike.position.x-=Math.sin(heading)*speed;
  bike.position.z+=Math.cos(heading)*speed;
  bike.position.y=0;
 
  // ── Rotación via Quaternion (SIN gimbal lock) ──
  _qHead.setFromAxisAngle(_axisY, heading);
  _qLean.setFromAxisAngle(_axisZ, leanAngle);
  bike.quaternion.copy(_qHead).multiply(_qLean);
 
  // ── Detección fuera de pista ──
  if(spline){
    const ct=getClosestT(bike.position);
    const cp=spline.getPoint(ct);
    const dist=Math.hypot(bike.position.x-cp.x, bike.position.z-cp.z);
    onTrack=dist<circuit.trackW/2+1.8;
    checkSector(ct);
 
    if(!onTrack){
      offTrackTimer++;
      if(offTrackTimer>8) document.getElementById('offtrack-msg').style.opacity='1';
    } else {
      offTrackTimer=0;
      document.getElementById('offtrack-msg').style.opacity='0';
    }
  }
 
  checkLap();
  updateGear();
  updateRPM();
 
  // ── HUD ──
  const elapsed=(performance.now()-lapStart)/1000;
  document.getElementById('h-time').textContent=elapsed.toFixed(2);
  document.getElementById('h-speed').textContent=Math.floor(speed*162)+' km/h';
 
  // ── Cámara de persecución ──
  // Detrás = opuesto al vector forward
  // forward.x = -sin(heading) → behind.x = +sin(heading)
  // forward.z = +cos(heading) → behind.z = -cos(heading)
  const cd=12+speed*3.5, ch=4.8+speed;
  _camTgt.set(
    bike.position.x+Math.sin(heading)*cd,
    bike.position.y+ch,
    bike.position.z-Math.cos(heading)*cd
  );
  camera.position.lerp(_camTgt,.08);
 
  // La cámara mira ligeramente por delante de la moto
  _camLook.set(
    bike.position.x-Math.sin(heading)*2,
    bike.position.y+.7,
    bike.position.z+Math.cos(heading)*2
  );
  camera.lookAt(_camLook);
 
  drawMinimap();
  renderer.render(scene,camera);
}
 
// ═══════════════════════════════════════════════════════════════
//  RESIZE
// ═══════════════════════════════════════════════════════════════
addEventListener('resize',()=>{
  renderer.setSize(innerWidth,innerHeight);
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
});
 
renderer.render(scene,camera);
</script>
