<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro MotoGP</title>
    <style>
        :root {
            --red: #e10600;
            --bg: #111;
            --panel: #1a1a1a;
            --line: #333;
            --text: #fff;
            --muted: #9a9a9a;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top, rgba(225, 6, 0, 0.12), transparent 28%), var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .box {
            width: min(100%, 460px);
            background: var(--panel);
            padding: 36px;
            border-radius: 14px;
            border: 1px solid var(--line);
            border-left: 5px solid var(--red);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
        }

        h1 {
            margin: 0 0 14px;
            color: var(--red);
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            margin: 0 0 20px;
            color: var(--muted);
            line-height: 1.5;
        }

        .server-box {
            margin-bottom: 18px;
            padding: 12px;
            background: #151515;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #cfcfcf;
            font-size: 13px;
            line-height: 1.5;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            width: 100%;
            background: var(--red);
            color: white;
            border: none;
            padding: 14px 16px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 6px;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        button:hover {
            background: #ff1a1a;
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .status {
            margin-top: 18px;
            font-size: 14px;
            color: var(--muted);
            line-height: 1.5;
            white-space: pre-line;
        }

        .status.ok { color: #a7ffb0; }
        .status.warn { color: #ffd36c; }
        .status.error { color: #ff8b8b; }
    </style>
    <style>
        .records-container {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid var(--line);
        }
        .records-container h2 {
            margin-bottom: 15px;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--muted);
        }
        #recordsList {
            list-style: none;
            padding: 0;
            max-height: 240px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }
        #recordsList li {
            background: #222;
            padding: 10px 14px;
            margin-bottom: 8px;
            border-radius: 4px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        #recordsList .record-main { font-weight: bold; }
        #recordsList .record-meta { font-size: 11px; color: #888; text-align: right; }
        #recordsList::-webkit-scrollbar { width: 4px; }
        #recordsList::-webkit-scrollbar-track { background: #111; }
        #recordsList::-webkit-scrollbar-thumb { background: var(--red); }
    </style>
</head>
<body>
    <div class="box">
        <h1>MotoGP Registry</h1>
        <p>El registro se guarda directamente en tu `fichajeregistros.json` cuando abras esta página desde el servidor local.</p>

        <div class="server-box" id="serverInfo">Comprobando conexión con el servidor local...</div>

        <input type="text" id="name" placeholder="Nombre del piloto">
        <input type="text" id="team" placeholder="Escudería">
        <input type="email" id="email" placeholder="Correo electrónico">

        <button type="button" id="btnSave">Registrar piloto</button>

        <div id="msg" class="status">Listo para nueva entrada...</div>

        <div class="records-container">
            <h2>Pilotos Fichados</h2>
            <ul id="recordsList"></ul>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function setStatus(message, type = '') {
            const msg = document.getElementById('msg');
            msg.className = `status${type ? ` ${type}` : ''}`;
            msg.textContent = message;
        }

        function setServerInfo(message, type = '') {
            const info = document.getElementById('serverInfo');
            info.textContent = message;
            info.style.borderColor = type === 'error' ? '#6a1a1a' : '#2a2a2a';
        }

        function clearForm() {
            document.getElementById('name').value = '';
            document.getElementById('team').value = '';
            document.getElementById('email').value = '';
        }

        function buildRecord() {
            const name = document.getElementById('name').value.trim();
            const team = document.getElementById('team').value.trim();
            const email = document.getElementById('email').value.trim();

            if (!name || !team || !email) {
                throw new Error('Por favor, rellena nombre, escudería y correo.');
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                throw new Error('Por favor, introduce un correo electrónico válido.');
            }

            return {
                piloto: name,
                escuderia: team,
                email
            };
        }

        async function checkServer() {
            try {
                const response = await fetch(`${API_BASE}/api/registros`, { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`Servidor devolvió ${response.status}`);
                }

                const data = await response.json();
                setServerInfo(`Servidor conectado. Archivo activo: .vscode/fichajeregistros.json. Registros actuales: ${data.length}.`);
                setStatus(`Base de datos conectada. ${data.length} pilotos en el registro.`, 'ok');
                loadRecords();
            } catch (error) {
                console.error(error);
                setServerInfo('Servidor local no disponible. Arranca `node server.js` y abre esta página desde http://localhost:5500/registro.html', 'error');
                setStatus('No hay conexión con el servidor local, así que no puedo guardar en el JSON todavía.', 'error');
            }
        }

        async function loadRecords() {
            try {
                const response = await fetch(`${API_BASE}/api/registros`, { cache: 'no-store' });
                if (!response.ok) return;

                const records = await response.json();
                const list = document.getElementById('recordsList');
                list.innerHTML = '';

                if (records.length === 0) {
                    list.innerHTML = '<li>No hay pilotos fichados todavía.</li>';
                    return;
                }

                records.reverse().forEach(record => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <div class="record-main">${record.piloto} <span style="color: #888; font-weight: normal;">(${record.escuderia})</span></div>
                        <div class="record-meta">${record.email}<br><span style="font-size: 10px;">${record.fecha_registro}</span></div>
                    `;
                    list.appendChild(li);
                });
            } catch (error) {
                console.error('Error cargando registros:', error);
            }
        }

        async function saveRecord() {
            const btn = document.getElementById('btnSave');

            try {
                const payload = buildRecord();
                btn.disabled = true;

                const response = await fetch(`${API_BASE}/api/registros`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'No se pudo guardar el registro.');
                }

                clearForm();
                setStatus(`Registro guardado correctamente. Total actual: ${data.total}.`, 'ok');
                setServerInfo(`Servidor conectado. Registros actuales: ${data.total}.`);
                loadRecords();
            } catch (error) {
                console.error(error);
                setStatus(error.message || 'No se pudo guardar el registro.', 'error');
            } finally {
                btn.disabled = false;
            }
        }

        document.getElementById('btnSave').addEventListener('click', saveRecord);
        checkServer();
    </script>
</body>
</html>
