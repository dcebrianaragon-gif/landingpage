<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Mi Sitio</title>
    <style>
        /* Diseño general de la página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        
        /* Contenedor del formulario (La tarjeta blanca) */
        .register-container {
            background-color: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        
        .register-container h2 {
            text-align: center;
            color: #333;
            margin-top: 0;
            margin-bottom: 25px;
        }
        
        /* Estilos de los campos de entrada */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            border-color: #00bcd4; /* Color cyan que combina con tu juego */
            outline: none;
            box-shadow: 0 0 5px rgba(0, 188, 212, 0.3);
        }
        
        /* Botón de registro */
        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: #00bcd4;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        
        .btn-submit:hover {
            background-color: #008ba3;
        }
        
        .btn-submit:active {
            transform: scale(0.98);
        }
        
        /* Mensajes de error y enlaces */
        .error-message {
            color: #ff4444;
            font-size: 14px;
            text-align: center;
            margin-top: 15px;
            display: none; /* Oculto por defecto */
        }
        
        .login-link {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #666;
        }
        
        .login-link a {
            color: #00bcd4;
            text-decoration: none;
            font-weight: bold;
        }
        
        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <h2>Crear una Cuenta</h2>
        
        <form id="registerForm">
            <div class="form-group">
                <label for="username">Nombre de Piloto</label>
                <input type="text" id="username" placeholder="Ej: SpeedRacer99" required minlength="3">
            </div>
            
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@email.com" required>
            </div>
            
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" required minlength="6">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirmar contraseña</label>
                <input type="password" id="confirmPassword" placeholder="Repite tu contraseña" required minlength="6">
            </div>
            
            <button type="submit" class="btn-submit">Registrarse e ir a la entrada</button>
            <p id="errorMsg" class="error-message">Las contraseñas no coinciden.</p>
        </form>
        
        <div class="login-link">
            ¿Ya tienes cuenta? <a href="#">Inicia sesión aquí</a>
        </div>
    </div>

    <script>
        // Lógica de validación y redirección
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault(); // Evita que la página se recargue al enviar el formulario

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const errorMsg = document.getElementById('errorMsg');

            // 1. Validar que las contraseñas sean iguales
            if (password !== confirmPassword) {
                errorMsg.style.display = 'block';
                return; // Detiene la ejecución aquí si hay error
            }

            // Si todo está correcto, ocultamos el error (por si estaba visible)
            errorMsg.style.display = 'none';

            // 2. Guardar el nombre de usuario en el navegador (opcional, como hicimos en el juego)
            localStorage.setItem('motoPlayer', username);

            // 3. Redirigir al usuario a entrada1.html
            // Nota: Para que esto funcione, entrada1.html debe estar en la misma carpeta que este archivo.
            window.location.href = 'entrada1.html';
        });
    </script>

</body>
</html>
