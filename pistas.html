<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACK ANALYSIS | PROTOCOL 2026</title>
    <style>
        /* ================================================================
           [01] DESIGN SYSTEM & VARIABLES (Mismo estilo que entrada1)
           ================================================================
        */
        :root {
            --red: #e10000;
            --black: #000000;
            --grey-900: #050505;
            --font-racing: 'Arial Black', sans-serif;
            --font-data: 'Courier New', monospace;
            --transition-fast: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            background-color: var(--black);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* CURSOR */
        #pro-cursor {
            position: fixed; width: 40px; height: 40px; border: 1px solid var(--red);
            border-radius: 50%; pointer-events: none; z-index: 100001;
            transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center;
            mix-blend-mode: difference;
        }
        .cursor-dot { width: 4px; height: 4px; background: var(--red); border-radius: 50%; }

        /* HEADER / NAV */
        header {
            position: fixed; top: 0; width: 100%; padding: 30px 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .btn-back {
            color: #fff; text-decoration: none; font-family: var(--font-data);
            font-size: 14px; font-weight: bold; border: 1px solid #444;
            padding: 10px 20px; transition: var(--transition-fast);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }
        .btn-back:hover { background: var(--red); border-color: var(--red); }
        
        .sys-status { font-family: var(--font-data); font-size: 12px; color: var(--red); }

        /* LAYOUT PRINCIPAL */
        .track-container {
            display: flex; height: 100vh; width: 100vw;
        }

        /* PANEL IZQUIERDO: EL MAPA */
        .map-display {
            flex: 1; position: relative;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            border-right: 1px solid #333;
        }
        .map-display img {
            width: 80%; max-height: 80vh; object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(225,0,0,0.2)) grayscale(100%) contrast(150%);
            transition: 1s; animation: pulseMap 4s infinite alternate;
        }
        @keyframes pulseMap { 0% { filter: drop-shadow(0 0 10px rgba(225,0,0,0.1)) grayscale(100%) contrast(150%); } 100% { filter: drop-shadow(0 0 30px rgba(225,0,0,0.4)) grayscale(100%) contrast(150%); } }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.3); box-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            animation: scan 3s linear infinite; pointer-events: none;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* PANEL DERECHO: DATOS TÉCNICOS */
        .data-panel {
            width: 450px; background: var(--grey-900); padding: 100px 50px;
            display: flex; flex-direction: column; justify-content: center;
        }
        .track-title {
            font-family: var(--font-racing); font-size: 50px;
            font-style: italic; color: #fff; line-height: 1; margin-bottom: 30px;
        }
        .track-title span { color: var(--red); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .stat-box { border-left: 2px solid var(--red); padding-left: 15px; }
        .stat-label { font-family: var(--font-data); font-size: 10px; color: #666; letter-spacing: 2px; }
        .stat-value { font-family: var(--font-racing); font-size: 24px; color: #fff; margin-top: 5px; }

        .track-desc {
            font-family: var(--font-data); font-size: 14px; color: #888;
            line-height: 1.8; border-top: 1px solid #222; padding-top: 30px;
        }

    </style>
</head>
<body>

    <div id="pro-cursor"><div class="cursor-dot"></div></div>

    <header>
        <a href="entrada1.html#circuit-maps" class="btn-back"> Volver atras</a>
        <div class="sys-status">[ LIVE_TELEMETRY_FEED ]</div>
    </header>

    <div class="track-container">
        <div class="map-display">
            <div class="scan-line"></div>
            <img id="map-img" src="" alt="Track Map">
        </div>

        <div class="data-panel">
            <h1 class="track-title" id="track-name">Cargando<span>...</span></h1>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">LONGITUD</div>
                    <div class="stat-value" id="track-length">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">CURVAS</div>
                    <div class="stat-value" id="track-curves">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">RECORD_VUELTA</div>
                    <div class="stat-value" id="track-record">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">TOP_SPEED</div>
                    <div class="stat-value" id="track-speed">--</div>
                </div>
            </div>

            <p class="track-desc" id="track-desc">
                Estableciendo conexión con los sensores de pista... Obteniendo telemetría.
            </p>
        </div>
    </div>

    <script>
        // Cursor
        const cursor = document.getElementById('pro-cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Base de datos de circuitos
        const trackData = {
            "jerez": {
                name: "JEREZ",
                length: "4.42 km",
                curves: "13 (5 Izq, 8 Der)",
                record: "1'36.170",
                speed: "300.5 km/h",
                desc: "Circuito muy técnico caracterizado por fuertes frenadas y curvas rápidas y enlazadas. La gestión del neumático delantero es crítica en las curvas de alta velocidad del sector 3.",
                img: "mapa-jerez.png" // Cambia esto por la imagen real de tu mapa
            },
            "mugello": {
                name: "MUGELLO",
                length: "5.25 km",
                curves: "15 (6 Izq, 9 Der)",
                record: "1'44.855",
                speed: "366.1 km/h",
                desc: "Una de las rectas más rápidas del campeonato combinada con cambios de rasante ciegos. Exige un motor potente y una aerodinámica perfecta para evitar que la moto despegue en el rasante.",
                img: "mapa-mugello.png"
            },
            "assen": {
                name: "ASSEN",
                length: "4.54 km",
                curves: "18 (6 Izq, 12 Der)",
                record: "1'31.504",
                speed: "318.4 km/h",
                desc: "La 'Catedral' del motociclismo. Un trazado muy rápido y fluido donde los pilotos pasan gran parte de la vuelta inclinados. La chicane final es el punto crítico para adelantar en la última vuelta.",
                img: "mapa-assen.png"
            },
            // Añade aquí el resto (phillip-island, sachsenring, valencia) siguiendo la misma estructura
        };

        // Leer parámetro de la URL (ej: track.html?id=jerez)
        const urlParams = new URLSearchParams(window.location.search);
        let trackId = urlParams.get('id');

        // Si no hay ID o el ID no existe en la base de datos, cargar Jerez por defecto
        if (!trackId || !trackData[trackId]) {
            trackId = "jerez"; 
        }

        const data = trackData[trackId];

        // Inyectar los datos en el HTML
        document.getElementById('track-name').innerHTML = `${data.name}<span>_</span>`;
        document.getElementById('track-length').innerText = data.length;
        document.getElementById('track-curves').innerText = data.curves;
        document.getElementById('track-record').innerText = data.record;
        document.getElementById('track-speed').innerText = data.speed;
        document.getElementById('track-desc').innerText = data.desc;
        
        // Imagen placeholder si no tienes imágenes (o pon la ruta de las tuyas en el JSON)
        document.getElementById('map-img').src = data.img;
        document.getElementById('map-img').onerror = function() {
            this.src = 'https://upload.wikimedia.org/wikipedia/commons/thumb/c/ca/Circuit_Jerez.svg/1024px-Circuit_Jerez.svg.png'; // Placeholder de respaldo
        };
        function initMaps() {
    // Hemos añadido una propiedad 'id' en minúsculas para pasarlo por la URL
    const circuits = [
        { id: "jerez", name: "Jerez", data: "4.42 km // 13 Curves" },
        { id: "mugello", name: "Mugello", data: "5.25 km // 15 Curves" },
        { id: "assen", name: "Assen", data: "4.54 km // 18 Curves" },
        { id: "phillip-island", name: "Phillip Island", data: "4.45 km // 12 Curves" },
        { id: "sachsenring", name: "Sachsenring", data: "3.67 km // 13 Curves" },
        { id: "valencia", name: "Valencia", data: "4.00 km // 14 Curves" }
    ];
    const container = document.getElementById('maps-target');

    circuits.forEach((c) => {
        const card = document.createElement('div');
        card.className = 'map-card';
        // Hacemos que toda la tarjeta sea clickable
        card.style.cursor = "none"; // Mantenemos tu cursor personalizado
        card.onclick = function() {
            window.location.href = `track.html?id=${c.id}`;
        };
        
        card.innerHTML = `
            <div class="map-name">${c.name.toUpperCase()}</div>
            <div class="map-data">${c.data}</div>
            <div style="margin-top:20px; font-family:var(--font-data); font-size:10px; color:var(--red);">[ ENGAGE_TRACK ]</div>
        `;
        container.appendChild(card);
    });
}
    </script>
</body>
</html>
