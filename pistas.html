<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACK ANALYSIS | PROTOCOL 2026</title>
    <style>
        /* ================================================================
           [01] DESIGN SYSTEM & VARIABLES
           ================================================================
        */
        :root {
            --red: #e10000;
            --black: #000000;
            --grey-900: #050505;
            --font-racing: 'Arial Black', sans-serif;
            --font-data: 'Courier New', monospace;
            --transition-fast: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            background-color: var(--black);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden; /* Evita scroll horizontal */
        }

        /* CURSOR */
        #pro-cursor {
            position: fixed; width: 40px; height: 40px; border: 1px solid var(--red);
            border-radius: 50%; pointer-events: none; z-index: 100001;
            transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center;
            mix-blend-mode: difference;
        }
        .cursor-dot { width: 4px; height: 4px; background: var(--red); border-radius: 50%; }

        /* HEADER / NAV */
        header {
            position: fixed; top: 0; width: 100%; padding: 30px 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .btn-back {
            color: #fff; text-decoration: none; font-family: var(--font-data);
            font-size: 14px; font-weight: bold; border: 1px solid #444;
            padding: 10px 20px; transition: var(--transition-fast);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            z-index: 100;
        }
        .btn-back:hover { background: var(--red); border-color: var(--red); }
        
        .sys-status { font-family: var(--font-data); font-size: 12px; color: var(--red); }

        /* LAYOUT PRINCIPAL */
        .track-container {
            display: flex; min-height: 100vh; width: 100vw;
        }

        /* PANEL IZQUIERDO: EL MAPA */
        .map-display {
            flex: 1; position: relative;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            border-right: 1px solid #333;
            perspective: 1200px; 
            overflow: hidden;
        }
        
        .map-display img {
            width: 70%; max-height: 70vh; object-fit: contain;
            /* SE ELIMINÓ grayscale(100%) AQUÍ */
            filter: drop-shadow(0 0 20px rgba(225,0,0,0.3)) contrast(150%);
            transition: transform 0.1s ease-out, filter 0.3s ease-out;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.3); box-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            animation: scan 3s linear infinite; pointer-events: none;
            z-index: 10;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* PANEL DERECHO: DATOS TÉCNICOS */
        .data-panel {
            width: 450px; background: var(--grey-900); padding: 100px 50px;
            display: flex; flex-direction: column; justify-content: center;
            z-index: 5;
        }
        .track-title {
            font-family: var(--font-racing); font-size: 50px;
            font-style: italic; color: #fff; line-height: 1; margin-bottom: 30px;
        }
        .track-title span { color: var(--red); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .stat-box { border-left: 2px solid var(--red); padding-left: 15px; }
        .stat-label { font-family: var(--font-data); font-size: 10px; color: #666; letter-spacing: 2px; }
        .stat-value { font-family: var(--font-racing); font-size: 24px; color: #fff; margin-top: 5px; }

        .track-desc {
            font-family: var(--font-data); font-size: 14px; color: #888;
            line-height: 1.8; border-top: 1px solid #222; padding-top: 30px;
        }

        /* ================================================================
           [02] RESPONSIVIDAD (OPTIMIZACIÓN MÓVIL)
           ================================================================
        */
        @media (max-width: 850px) {
            * { cursor: auto; } /* Restaura el cursor normal en pantallas pequeñas */
            #pro-cursor { display: none; } /* Oculta el cursor custom en móvil */

            header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
            }

            .track-container {
                flex-direction: column; /* Apila el mapa y los datos verticalmente */
            }

            .map-display {
                border-right: none;
                border-bottom: 1px solid #333;
                min-height: 50vh; /* El mapa ocupa la mitad superior */
                padding-top: 80px; /* Deja espacio para el header */
            }

            .map-display img {
                width: 90%;
            }

            .data-panel {
                width: 100%;
                padding: 40px 25px;
                align-items: center; /* Centra el contenido en móvil */
                text-align: center;
            }

            .track-title {
                font-size: 35px;
            }

            .stats-grid {
                width: 100%;
                gap: 15px;
            }

            .stat-box {
                border-left: none;
                border-top: 2px solid var(--red); /* Cambia la línea de diseño para que quede mejor centrada */
                padding-left: 0;
                padding-top: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="pro-cursor"><div class="cursor-dot"></div></div>

    <header>
        <a href="entrada1.html#circuit-maps" class="btn-back"> < VOLVER ATRÁS</a>
        <div class="sys-status">[ LIVE_TELEMETRY_FEED ]</div>
    </header>

    <div class="track-container">
        <div class="map-display" id="3d-container">
            <div class="scan-line"></div>
            <img id="map-img" src="" alt="Track Map">
        </div>

        <div class="data-panel">
            <h1 class="track-title" id="track-name">Cargando<span>...</span></h1>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">LONGITUD</div>
                    <div class="stat-value" id="track-length">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">CURVAS</div>
                    <div class="stat-value" id="track-curves">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">RECORD_VUELTA</div>
                    <div class="stat-value" id="track-record">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">TOP_SPEED</div>
                    <div class="stat-value" id="track-speed">--</div>
                </div>
            </div>

            <p class="track-desc" id="track-desc">
                Estableciendo conexión con los sensores de pista... Obteniendo telemetría.
            </p>
        </div>
    </div>

    <script>
        // 1. Cursor Personalizado (Solo activo si no estamos en móvil)
        const cursor = document.getElementById('pro-cursor');
        if (window.innerWidth > 850) {
            document.addEventListener('mousemove', e => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        }

        // 2. Base de datos de circuitos COMPLETA
        const trackData = {
            "jerez": {
                name: "JEREZ",
                length: "4.42 km",
                curves: "13 (5 Izq, 8 Der)",
                record: "1'36.170",
                speed: "300.5 km/h",
                desc: "Circuito muy técnico caracterizado por fuertes frenadas y curvas rápidas y enlazadas. La gestión del neumático delantero es crítica en las curvas de alta velocidad del sector 3.",
                img: "jerez.png" 
            },
            "mugello": {
                name: "MUGELLO",
                length: "5.25 km",
                curves: "15 (6 Izq, 9 Der)",
                record: "1'44.855",
                speed: "366.1 km/h",
                desc: "Una de las rectas más rápidas del campeonato combinada con cambios de rasante ciegos. Exige un motor potente y una aerodinámica perfecta para evitar que la moto despegue en el rasante.",
                img: "mugello.png" 
            },
            "assen": {
                name: "ASSEN",
                length: "4.54 km",
                curves: "18 (6 Izq, 12 Der)",
                record: "1'31.504",
                speed: "318.4 km/h",
                desc: "La 'Catedral' del motociclismo. Un trazado muy rápido y fluido donde los pilotos pasan gran parte de la vuelta inclinados. La chicane final es el punto crítico para adelantar en la última vuelta.",
                img: "assen.png"
            },
            "phillip-island": {
                name: "PHILLIP_IS",
                length: "4.45 km",
                curves: "12 (7 Izq, 5 Der)",
                record: "1'27.246",
                speed: "349.5 km/h",
                desc: "Posiblemente el circuito más espectacular del mundo. Una pista rapidísima a la orilla del mar donde la valentía del piloto y el control del acelerador en curvas largas de izquierdas son clave.",
                img: "philipisland.png"
            },
            "sachsenring": {
                name: "SACHSENR.",
                length: "3.67 km",
                curves: "13 (10 Izq, 3 Der)",
                record: "1'19.765",
                speed: "304.2 km/h",
                desc: "Un circuito ratonero, lento y asimétrico. Los neumáticos sufren un estrés brutal en el lado izquierdo. La curva 11 ('Waterfall') es una bajada ciega a derechas rapidísima tras estar mucho tiempo inclinados a la izquierda.",
                img: "sachsenring.png"
            },
            "valencia": {
                name: "VALENCIA",
                length: "4.00 km",
                curves: "14 (9 Izq, 5 Der)",
                record: "1'28.931",
                speed: "337.5 km/h",
                desc: "Trazado estilo 'estadio', estrecho y con muchas curvas lentas. Suele albergar la carrera final de la temporada, convirtiéndose en un escenario de alta tensión para la resolución de campeonatos.",
                img: "valencia.png"
            }
        };

        // 3. Inyección de datos
        const urlParams = new URLSearchParams(window.location.search);
        let trackId = urlParams.get('id');

        // Selecciona Jerez por defecto si no hay ID o es incorrecto
        if (!trackId || !trackData[trackId]) {
            trackId = "jerez"; 
        }

        const data = trackData[trackId];

        document.getElementById('track-name').innerHTML = `${data.name}<span>_</span>`;
        document.getElementById('track-length').innerText = data.length;
        document.getElementById('track-curves').innerText = data.curves;
        document.getElementById('track-record').innerText = data.record;
        document.getElementById('track-speed').innerText = data.speed;
        document.getElementById('track-desc').innerText = data.desc;
        document.getElementById('map-img').src = data.img;

        // =========================================================
        // 4. EFECTO HOVER 3D INTERACTIVO
        // =========================================================
        const container3D = document.getElementById('3d-container');
        const img3D = document.getElementById('map-img');

        // Solo aplicamos el efecto 3D si estamos en escritorio para no volver loco el scroll en móviles
        if (window.innerWidth > 850) {
            container3D.addEventListener('mousemove', (e) => {
                const rect = container3D.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                const centerX = rect.width / 2;
                const centerY = rect.height / 2;
                
                const rotateX = ((y - centerY) / centerY) * -20; 
                const rotateY = ((x - centerX) / centerX) * 20;

                // SE ELIMINÓ grayscale(100%) AQUÍ
                img3D.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
                img3D.style.filter = `drop-shadow(${rotateY * -1}px ${rotateX * 1 + 20}px 30px rgba(225,0,0,0.6)) contrast(150%)`;
            });

            container3D.addEventListener('mouseleave', () => {
                img3D.style.transition = 'transform 0.5s ease-out, filter 0.5s ease-out';
                img3D.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                // SE ELIMINÓ grayscale(100%) AQUÍ
                img3D.style.filter = `drop-shadow(0 0 20px rgba(225,0,0,0.3)) contrast(150%)`;
                
                setTimeout(() => {
                    img3D.style.transition = 'transform 0.1s ease-out, filter 0.3s ease-out';
                }, 500);
            });
        }
    </script>
</body>
</html>
