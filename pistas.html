<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRACK ANALYSIS | PROTOCOL 2026</title>
    <style>
        /* ================================================================
           [01] DESIGN SYSTEM & VARIABLES
           ================================================================
        */
        :root {
            --red: #e10000;
            --black: #000000;
            --grey-900: #050505;
            --font-racing: 'Arial Black', sans-serif;
            --font-data: 'Courier New', monospace;
            --transition-fast: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            background-color: var(--black);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* CURSOR */
        #pro-cursor {
            position: fixed; width: 40px; height: 40px; border: 1px solid var(--red);
            border-radius: 50%; pointer-events: none; z-index: 100001;
            transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center;
            mix-blend-mode: difference;
        }
        .cursor-dot { width: 4px; height: 4px; background: var(--red); border-radius: 50%; }

        /* HEADER / NAV */
        header {
            position: fixed; top: 0; width: 100%; padding: 30px 40px;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        .btn-back {
            color: #fff; text-decoration: none; font-family: var(--font-data);
            font-size: 14px; font-weight: bold; border: 1px solid #444;
            padding: 10px 20px; transition: var(--transition-fast);
            background: rgba(0,0,0,0.5); backdrop-filter: blur(5px);
            z-index: 100;
        }
        .btn-back:hover { background: var(--red); border-color: var(--red); }
        
        .sys-status { font-family: var(--font-data); font-size: 12px; color: var(--red); }

        /* ================================================================
           [02] LAYOUT PRINCIPAL (TRACK DATA)
           ================================================================
        */
        .track-container {
            display: flex; min-height: 100vh; width: 100vw;
        }

        .map-display {
            flex: 1; position: relative;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            display: flex; align-items: center; justify-content: center;
            border-right: 1px solid #333;
            perspective: 1200px; 
            overflow: hidden;
        }
        
        .map-display img {
            width: 70%; max-height: 70vh; object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(225,0,0,0.3)) contrast(150%);
            transition: transform 0.1s ease-out, filter 0.3s ease-out;
            transform-style: preserve-3d;
            will-change: transform;
        }

        .scan-line {
            position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.3); box-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            animation: scan 3s linear infinite; pointer-events: none;
            z-index: 10;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .data-panel {
            width: 450px; background: var(--grey-900); padding: 100px 50px;
            display: flex; flex-direction: column; justify-content: center;
            z-index: 5;
        }
        .track-title {
            font-family: var(--font-racing); font-size: 50px;
            font-style: italic; color: #fff; line-height: 1; margin-bottom: 30px;
        }
        .track-title span { color: var(--red); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 40px; }
        .stat-box { border-left: 2px solid var(--red); padding-left: 15px; }
        .stat-label { font-family: var(--font-data); font-size: 10px; color: #666; letter-spacing: 2px; }
        .stat-value { font-family: var(--font-racing); font-size: 24px; color: #fff; margin-top: 5px; }

        .track-desc {
            font-family: var(--font-data); font-size: 14px; color: #888;
            line-height: 1.8; border-top: 1px solid #222; padding-top: 30px;
        }

        /* ================================================================
           [03] SELECTOR DE CIRCUITOS Y ANIMACIÓN
           ================================================================
        */
        .selector-container {
            padding: 80px 50px;
            background: #020202;
            border-top: 1px solid #222;
            position: relative;
        }
        .selector-title {
            font-family: var(--font-racing); font-size: 30px;
            color: #fff; margin-bottom: 40px; text-align: center;
        }
        .selector-title span { color: var(--red); }

        .maps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .map-card {
            background: var(--grey-900);
            border: 1px solid #222;
            padding: 30px 20px;
            text-align: center;
            transition: var(--transition-fast);
            position: relative;
        }
        
        /* Efecto hover normal (se desactiva cuando se está expandiendo) */
        .map-card:hover:not(.is-expanding) {
            border-color: var(--red);
            transform: translateY(-5px);
            background: #0a0a0a;
        }
        
        .map-name { font-family: var(--font-racing); font-size: 20px; color: #fff; }
        .map-data { font-family: var(--font-data); font-size: 12px; color: #888; margin-top: 10px; }
        .scan-btn { margin-top: 20px; font-family: var(--font-data); font-size: 10px; color: var(--red); letter-spacing: 1px;}

        /* Animación de latido (Pulse) */
        @keyframes pulseClickAnim {
            0%   { transform: scale(1); background: #0a0a0a; border-color: var(--red); }
            50%  { transform: scale(1.08); background: rgba(225,0,0,0.3); border-color: #fff; box-shadow: 0 0 40px rgba(225,0,0,1); }
            100% { transform: scale(1); background: #0a0a0a; border-color: var(--red); }
        }
        
        .clicked-pulse {
            animation: pulseClickAnim 0.35s ease-in-out forwards !important;
            pointer-events: none;
        }

        /* ================================================================
           [04] RESPONSIVIDAD
           ================================================================
        */
        @media (max-width: 850px) {
            * { cursor: auto; }
            #pro-cursor { display: none; }
            header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .track-container { flex-direction: column; }
            .map-display { border-right: none; border-bottom: 1px solid #333; min-height: 50vh; padding-top: 80px; }
            .map-display img { width: 90%; }
            .data-panel { width: 100%; padding: 40px 25px; align-items: center; text-align: center; }
            .track-title { font-size: 35px; }
            .stats-grid { width: 100%; gap: 15px; }
            .stat-box { border-left: none; border-top: 2px solid var(--red); padding-left: 0; padding-top: 10px; }
            .selector-container { padding: 50px 20px; }
        }
    </style>
</head>
<body>

    <div id="pro-cursor"><div class="cursor-dot"></div></div>

    <header>
        <a href="entrada1.html" class="btn-back"> < VER OTROS CIRCUITOS</a>
        <div class="sys-status">[ Directo ]</div>
    </header>

    <div class="track-container">
        <div class="map-display" id="3d-container">
            <div class="scan-line"></div>
            <img id="map-img" src="" alt="Track Map">
        </div>

        <div class="data-panel">
            <h1 class="track-title" id="track-name">Cargando<span>...</span></h1>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-label">LONGITUD</div>
                    <div class="stat-value" id="track-length">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">CURVAS</div>
                    <div class="stat-value" id="track-curves">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">RECORD_VUELTA</div>
                    <div class="stat-value" id="track-record">--</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">TOP_SPEED</div>
                    <div class="stat-value" id="track-speed">--</div>
                </div>
            </div>

            <p class="track-desc" id="track-desc">
                Estableciendo conexión con los sensores de pista... Obteniendo telemetría.
            </p>
        </div>
    </div>

    <div class="selector-container" id="circuit-maps">
        <h2 class="selector-title">SELECCIONAR <span>CIRCUITO</span></h2>
        <div class="maps-grid" id="maps-target">
            </div>
    </div>

    <script>
        // 1. Cursor Personalizado
        const cursor = document.getElementById('pro-cursor');
        if (window.innerWidth > 850) {
            document.addEventListener('mousemove', e => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
            });
        }

        // 2. Base de datos de circuitos
        const trackImageFallback = "jerez.png";
        const availableTrackImages = new Set(["imagenes/assen.png", "imagenes/jerez.png", "imagenes/mugello.png", "imagenes/philipisland.png", "imagenes/sachsenring.png", "imagenes/valencia.png"]);
        const resolveTrackImage = (imageName) => availableTrackImages.has(imageName) ? imageName : trackImageFallback;

        const trackData = {
            "qatar": { name: "LUSAIL", length: "5.38 km", curves: "16 (6 Izq, 10 Der)", record: "1'50.789", speed: "350.0 km/h", desc: "Carrera nocturna bajo los focos del desierto. La enorme recta de meta exige pura potencia.", img: resolveTrackImage("qatar.png") },
            "portimao": { name: "PORTIMÃO", length: "4.59 km", curves: "15 (6 Izq, 9 Der)", record: "1'36.836", speed: "340.5 km/h", desc: "La montaña rusa del Algarve. Un trazado muy físico con desniveles brutales y curvas ciegas.", img: resolveTrackImage("portimao.png") },
            "cota": { name: "COTA", length: "5.51 km", curves: "20 (11 Izq, 9 Der)", record: "2'01.397", speed: "345.1 km/h", desc: "El circuito más físico del mundial en Texas. Combina un primer sector vertiginoso con una larguísima recta.", img: resolveTrackImage("cota.png") },
            "jerez": { name: "JEREZ", length: "4.42 km", curves: "13 (5 Izq, 8 Der)", record: "1'36.170", speed: "300.5 km/h", desc: "Circuito muy técnico caracterizado por fuertes frenadas y curvas rápidas y enlazadas.", img: resolveTrackImage("jerez.png") },
            "lemans": { name: "LE MANS", length: "4.19 km", curves: "14 (5 Izq, 9 Der)", record: "1'30.450", speed: "323.5 km/h", desc: "Trazado de Stop and Go. Grandes frenadas y fuertes aceleraciones desde baja velocidad.", img: resolveTrackImage("lemans.png") },
            "mugello": { name: "MUGELLO", length: "5.25 km", curves: "15 (6 Izq, 9 Der)", record: "1'44.855", speed: "366.1 km/h", desc: "Una de las rectas más rápidas del campeonato combinada con cambios de rasante ciegos.", img: resolveTrackImage("mugello.png") },
            "catalunya": { name: "CATALUNYA", length: "4.66 km", curves: "14 (6 Izq, 8 Der)", record: "1'38.680", speed: "355.0 km/h", desc: "Trazado técnico con curvas largas de alta velocidad y una tremenda recta de meta.", img: resolveTrackImage("catalunya.png") },
            "assen": { name: "ASSEN", length: "4.54 km", curves: "18 (6 Izq, 12 Der)", record: "1'31.504", speed: "318.4 km/h", desc: "La Catedral del motociclismo. Un trazado muy rápido y fluido donde los pilotos pasan gran parte inclinados.", img: resolveTrackImage("assen.png") },
            "sachsenring": { name: "SACHSENR.", length: "3.67 km", curves: "13 (10 Izq, 3 Der)", record: "1'19.765", speed: "304.2 km/h", desc: "Un circuito ratonero, lento y asimétrico. Los neumáticos sufren un estrés brutal en el lado izquierdo.", img: resolveTrackImage("sachsenring.png") },
            "silverstone": { name: "SILVERST.", length: "5.90 km", curves: "18 (8 Izq, 10 Der)", record: "1'57.309", speed: "330.4 km/h", desc: "Uno de los trazados más largos, anchos y rápidos. Requiere una moto excepcionalmente ágil.", img: resolveTrackImage("silverstone.png") },
            "redbullring": { name: "RB RING", length: "4.35 km", curves: "11 (3 Izq, 8 Der)", record: "1'28.533", speed: "315.0 km/h", desc: "El templo de la pura potencia. Rectas unidas por fuertes y abruptas frenadas.", img: resolveTrackImage("redbullring.png") },
            "misano": { name: "MISANO", length: "4.23 km", curves: "16 (6 Izq, 10 Der)", record: "1'30.390", speed: "300.2 km/h", desc: "Pista técnica, plana y con poco margen de error a orillas del Adriático.", img: resolveTrackImage("misano.png") },
            "aragon": { name: "MOTORLAND", length: "5.08 km", curves: "17 (10 Izq, 7 Der)", record: "1'46.069", speed: "345.8 km/h", desc: "Destaca por su espectacular sacacorchos inverso y una larguísima recta trasera en bajada.", img: resolveTrackImage("aragon.png") },
            "phillipisland": { name: "PHILLIP_IS", length: "4.45 km", curves: "12 (7 Izq, 5 Der)", record: "1'27.246", speed: "349.5 km/h", desc: "Una pista rapidísima a la orilla del mar donde la valentía del piloto es la clave.", img: resolveTrackImage("philipisland.png") },
            "sepang": { name: "SEPANG", length: "5.54 km", curves: "15 (5 Izq, 10 Der)", record: "1'57.491", speed: "335.5 km/h", desc: "Asfalto abrasivo y calor extremo. Dos inmensas rectas paralelas terminan en frenadas críticas.", img: resolveTrackImage("sepang.png") },
            "valencia": { name: "VALENCIA", length: "4.00 km", curves: "14 (9 Izq, 5 Der)", record: "1'28.931", speed: "337.5 km/h", desc: "Trazado estilo estadio, muy estrecho y con multitud de curvas lentas.", img: resolveTrackImage("valencia.png") }
        };

        // 3. Inyección de datos
        const urlParams = new URLSearchParams(window.location.search);
        let trackId = urlParams.get('id');
        if (!trackId || !trackData[trackId]) { trackId = "jerez"; } // Carga Jerez por defecto si no hay ID

        const data = trackData[trackId];
        document.getElementById('track-name').innerHTML = `${data.name}<span>_</span>`;
        document.getElementById('track-length').innerText = data.length;
        document.getElementById('track-curves').innerText = data.curves;
        document.getElementById('track-record').innerText = data.record;
        document.getElementById('track-speed').innerText = data.speed;
        document.getElementById('track-desc').innerText = data.desc;
        document.getElementById('map-img').src = data.img;

        // 4. Efecto Hover 3D
        const container3D = document.getElementById('3d-container');
        const img3D = document.getElementById('map-img');
        if (window.innerWidth > 850) {
            container3D.addEventListener('mousemove', (e) => {
                const rect = container3D.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const rotateX = ((y - (rect.height / 2)) / (rect.height / 2)) * -20; 
                const rotateY = ((x - (rect.width / 2)) / (rect.width / 2)) * 20;

                img3D.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.05, 1.05, 1.05)`;
                img3D.style.filter = `drop-shadow(${rotateY * -1}px ${rotateX * 1 + 20}px 30px rgba(225,0,0,0.6)) contrast(150%)`;
            });
            container3D.addEventListener('mouseleave', () => {
                img3D.style.transition = 'transform 0.5s ease-out, filter 0.5s ease-out';
                img3D.style.transform = `rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                img3D.style.filter = `drop-shadow(0 0 20px rgba(225,0,0,0.3)) contrast(150%)`;
                setTimeout(() => { img3D.style.transition = 'transform 0.1s ease-out, filter 0.3s ease-out'; }, 500);
            });
        }

        // 5. CREADOR DEL MENÚ DE CIRCUITOS Y ANIMACIÓN DE EXPANSIÓN
        const gridContainer = document.getElementById('maps-target');
        
        Object.keys(trackData).forEach(key => {
            const circuit = trackData[key];
            const card = document.createElement('div');
            card.className = 'map-card';
            
            // Marcar visualmente el circuito actual en el menú
            if (key === trackId) { card.style.borderColor = '#444'; }
            
            card.innerHTML = `
                <div class="map-name">${circuit.name}</div>
                <div class="map-data">${circuit.length} // ${circuit.curves.split(' ')[0]} CURVAS</div>
                <div class="scan-btn">[ INICIAR ESCANEO ]</div>
            `;

            // EVENTO PRINCIPAL DE ANIMACIÓN Y TRANSICIÓN
            card.onclick = function(e) {
                // Evitar clics múltiples si ya hay una animación en curso
                if (document.querySelector('.is-expanding')) return;
                
                // Marcamos que esta tarjeta se está expandiendo
                this.classList.add('is-expanding');

                // PASO 1: Obtener coordenadas de la tarjeta clickeada
                const rect = this.getBoundingClientRect();
                
                // PASO 2: Extraer la tarjeta del grid y fijarla en la pantalla exactamente donde estaba
                this.style.position = 'fixed';
                this.style.top = rect.top + 'px';
                this.style.left = rect.left + 'px';
                this.style.width = rect.width + 'px';
                this.style.height = rect.height + 'px';
                this.style.zIndex = '99999';
                this.style.margin = '0';
                
                // PASO 3: Disparar el "latido"
                this.classList.add('clicked-pulse');
                
                // PASO 4: Tras el latido, expandir a pantalla completa
                setTimeout(() => {
                    this.classList.remove('clicked-pulse'); // Quitamos latido
                    
                    // Forzamos transición de tamaño y color
                    this.style.transition = 'all 0.6s cubic-bezier(0.8, 0, 0.2, 1)';
                    
                    // Expansión total
                    this.style.top = '0px';
                    this.style.left = '0px';
                    this.style.width = '100vw';
                    this.style.height = '100vh';
                    
                    // Oscurecer la pantalla
                    this.style.backgroundColor = 'var(--black)'; 
                    this.style.borderColor = 'var(--black)';
                    
                    // Desvanecer el texto interno
                    Array.from(this.children).forEach(child => {
                        child.style.transition = 'opacity 0.2s ease-out';
                        child.style.opacity = '0';
                    });
                    
                }, 350); // 350ms (duración del latido)

                // PASO 5: Navegar cuando la pantalla ya está en negro
                setTimeout(() => {
                    window.location.href = `?id=${key}`;
                }, 900); // 350ms (latido) + 550ms (expansión)
            };

            gridContainer.appendChild(card);
        });
    </script>
</body>
</html>
